function updateTimeline(){ const cv=$("tlCv"); if(!cv||!world)return; const ctx=cv.getContext("2d");
  const dpr=Math.min(2,window.devicePixelRatio||1),r=cv.getBoundingClientRect();
  if(cv.width!==r.width*dpr){cv.width=r.width*dpr;cv.height=r.height*dpr;} ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,r.width,r.height); const s=world.metrics.series; if(s.length<2)return;
  const t0=s[0].t,t1=s[s.length-1].t||1; ctx.strokeStyle="#0b5cad";ctx.lineWidth=1.4;ctx.beginPath();
  s.forEach((p,i)=>{ const x=(p.t-t0)/(t1-t0)*r.width, y=r.height-(p.pdr||0)*r.height*0.9-2; i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
  ctx.stroke();
  if($("scrub")){ $("scrub").max=Math.max(0,world.snaps.length-1);
    if(replayIdx>=0)$("scrub").value=replayIdx; }

async function runSweep(){ if(!world)return; sweepCancel=false; $("sweepWrap").style.display="flex";
  const dens=[15,30,45,60], modes=C.MODES; SWEEP={}; let done=0, total=modes.length*dens.length;
  for(const m of modes){ SWEEP[m]=[];
    for(const d of dens){ if(sweepCancel)break;
      $("sweepTxt").textContent="Sweep "+m+" @ "+d+" veh…"; $("sweepFill").style.width=(done/total*100).toFixed(0)+"%";
      await new Promise(r=>setTimeout(r,0));
      const {sum}=runHeadless({mode:m,nVeh:d,seed:PARAMS.seed},12,PARAMS.seed);
      SWEEP[m].push({d,lat:sum.lat,p95:sum.p95,pdr:sum.pdr150}); done++;
    } if(sweepCancel)break; }
  $("sweepFill").style.width="100%"; $("sweepWrap").style.display="none";
  uiTab="latden"; buildTabs(); renderChart();
  uiLog({t:world.t,cls:"info",txt:sweepCancel?"Sweep cancelled":"Density sweep complete ("+total+" runs)"});

  const dens=[10,25,40,60,85,110], modes=C.MODES, col=C.MODE_COLOR, refD=60;
  const D={}, CDF={}, SAFE={}; for(const m of modes)D[m]=[];
  let done=0, total=modes.length*dens.length;
  for(const m of modes){ for(const d of dens){ if(sweepCancel)break;
    $("sweepTxt").textContent="Report: "+m+" @ "+d+" veh…"; $("sweepFill").style.width=(done/total*100).toFixed(0)+"%";
    await new Promise(r=>setTimeout(r,0));
    const {w,sum}=runHeadless({mode:m,nVeh:d,seed:PARAMS.seed,rsuOn:PARAMS.rsuOn,weather:PARAMS.weather,canyon:PARAMS.canyon,bgLoad:PARAMS.bgLoad},14,PARAMS.seed);
    D[m].push({d,pdr:sum.pdr,pdr150:sum.pdr150,lat:sum.lat,p95:sum.p95,p99:sum.p99,jit:sum.jit,cbr:sum.cbr,thr:sum.thr});
    if(d===refD){ CDF[m]=w.metrics.res.slice(0,4000); SAFE[m]=Object.assign({},w.metrics.safety,{wDelay:w.metrics.safety.wDelay.mean}); }
    done++; } if(sweepCancel)break; }
  $("sweepWrap").style.display="none"; if(btn)btn.disabled=false;
  if(sweepCancel){ uiLog({t:world.t,cls:"info",txt:"Report cancelled"}); return; }
  // offscreen chart rendering
  const holder=document.createElement("div"); holder.style.cssText="position:absolute;left:-99999px;top:0;width:840px;height:470px";
  const cv=document.createElement("canvas"); cv.style.width="840px"; cv.style.height="470px";
  holder.appendChild(cv); document.body.appendChild(holder); const ch=new Chart(cv); const imgs={};
  const xy=(title,yl,pick)=>{ ch.clear(title,"vehicles (demand level)",yl);
    let xmax=1,ymax=1e-6; for(const m of modes)for(const r of D[m]){xmax=Math.max(xmax,r.d);ymax=Math.max(ymax,pick(r)||0);}
    ch.setScale(0,xmax,0,ymax*1.14||1); const items=[];
    for(const m of modes){ const c=col[m], pts=D[m].map(r=>[r.d,pick(r)||0]); ch.line(pts,c,null,2); ch.scatter(pts,c,3.2); items.push({label:m,color:c}); }
    ch.legend(items); };
  xy("Mean end-to-end latency vs vehicle density","latency (ms)",r=>r.lat); imgs.lat=cv.toDataURL();
  xy("95th-percentile latency vs density (tail)","p95 latency (ms)",r=>r.p95); imgs.p95=cv.toDataURL();
  xy("Packet delivery ratio @150 m vs density","PDR @150 m",r=>r.pdr150); imgs.pdr=cv.toDataURL();
  xy("Channel busy ratio vs density","CBR",r=>r.cbr); imgs.cbr=cv.toDataURL();
  ch.cdf(modes.map(m=>({label:m,vals:CDF[m]||[],color:col[m]}))); imgs.cdf=cv.toDataURL();
  ch.box(modes.map(m=>({label:m,vals:CDF[m]||[],color:col[m]}))); imgs.box=cv.toDataURL();
  ch.bars(modes.map(m=>({label:m,value:SAFE[m]?SAFE[m].warnOk:0,color:col[m]})),"ICW warnings delivered on time (@"+refD+" veh)","count"); imgs.warn=cv.toDataURL();
  ch.bars(modes.map(m=>({label:m,value:SAFE[m]?SAFE[m].wDelay:0,color:col[m]})),"Mean warning delivery delay (@"+refD+" veh)","ms"); imgs.wdelay=cv.toDataURL();
  document.body.removeChild(holder);
  // data table + csv
  const near=(m)=>{ let best=D[m][0]; for(const r of D[m])if(Math.abs(r.d-refD)<Math.abs(best.d-refD))best=r; return best; };
  let csv="mode,vehicles,pdr_all,pdr150,lat_ms,p95_ms,p99_ms,jitter_ms,cbr,goodput_kbps\n";
  for(const m of modes)for(const r of D[m])csv+=[m,r.d,fmt(r.pdr,4),fmt(r.pdr150,4),fmt(r.lat,2),fmt(r.p95,2),fmt(r.p99,2),fmt(r.jit,2),fmt(r.cbr,4),fmt(r.thr,1)].join(",")+"\n";
  const csvURI="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
  const fig=(src,cap)=>'<figure><img src="'+src+'"><figcaption>'+cap+'</figcaption></figure>';
  let sumT='<table><thead><tr><th>RAT</th><th>PDR@150 m</th><th>Latency (ms)</th><th>p95 (ms)</th><th>Jitter (ms)</th><th>CBR</th><th>Goodput (kbps)</th><th>ICW on-time</th><th>Warn delay (ms)</th></tr></thead><tbody>';
  for(const m of modes){ const r=near(m), s=SAFE[m]||{};
    sumT+='<tr><td class="m" style="color:'+col[m]+'">'+m+'</td><td>'+fpct(r.pdr150)+'</td><td>'+fms(r.lat)+'</td><td>'+fms(r.p95)+'</td><td>'+fms(r.jit)+'</td><td>'+fpct(r.cbr)+'</td><td>'+fms(r.thr)+'</td><td>'+(s.warnOk||0)+'</td><td>'+fms(s.wDelay||0)+'</td></tr>'; }
  sumT+='</tbody></table>';
  let fullT='<table class="data"><thead><tr><th>Mode</th><th>Veh</th><th>PDR@150</th><th>Lat</th><th>p95</th><th>p99</th><th>Jitter</th><th>CBR</th><th>Goodput</th></tr></thead><tbody>';
  for(const m of modes)for(const r of D[m])fullT+='<tr><td style="color:'+col[m]+'">'+m+'</td><td>'+r.d+'</td><td>'+fpct(r.pdr150)+'</td><td>'+fms(r.lat)+'</td><td>'+fms(r.p95)+'</td><td>'+fms(r.p99)+'</td><td>'+fms(r.jit)+'</td><td>'+fpct(r.cbr)+'</td><td>'+fms(r.thr)+'</td></tr>';
  fullT+='</tbody></table>';
  const P=world.p, now=new Date();
  const html='<!doctype html><html><head><meta charset="utf-8"><title>V2X DSRC vs C-V2X - comparison report</title>'
   +'<style>body{font:13px/1.55 -apple-system,Segoe UI,Roboto,sans-serif;color:#1d2733;max-width:960px;margin:24px auto;padding:0 20px}'
   +'h1{font-size:20px;margin:0 0 2px}h2{font-size:15px;margin:26px 0 8px;color:#0b5cad;border-bottom:1px solid #e2e5ea;padding-bottom:3px}'
   +'.meta{color:#5b636e;font-size:12px;margin-bottom:8px}table{border-collapse:collapse;width:100%;font-size:12px;margin:6px 0}'
   +'th,td{border:1px solid #dde1e6;padding:4px 7px;text-align:right}th{background:#f4f6f9;text-align:right}td.m,th:first-child,td:first-child{text-align:left}'
   +'figure{margin:10px 0;text-align:center}img{max-width:100%;border:1px solid #e2e5ea;border-radius:3px}'
   +'figcaption{font-size:11px;color:#5b636e;margin-top:3px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}'
   +'.note{background:#f6f8fa;border-left:3px solid #0b5cad;padding:8px 12px;font-size:12px;margin:8px 0}'
   +'a.dl{display:inline-block;background:#0b5cad;color:#fff;padding:6px 12px;border-radius:3px;text-decoration:none;font-size:12px}'
   +'ul{margin:6px 0 6px 18px}code{background:#eef1f4;padding:1px 4px;border-radius:2px}</style></head><body>'
   +'<h1>DSRC vs C-V2X - intersection collision-avoidance comparison</h1>'
   +'<div class="meta">Generated '+now.toISOString().slice(0,16).replace("T"," ")+' UTC · seed '+P.seed
   +' · environment: '+P.weather+(P.canyon?", urban canyon":"")+(P.rsuOn?", RSU on":", RSU off")+', background load '+fpct(P.bgLoad)
   +' · each point = 14 s headless run · densities '+dens.join(", ")+' vehicles.</div>'
   +'<div class="note">Self-contained report produced by the V2X intersection simulator. Every RAT was run through the identical traffic, geometry and channel model; only the access-layer/scheduler differs. Figures are indicative of <em>relative</em> behaviour - see the tool README for model assumptions and simplifications.</div>'
   +'<h2>Summary at '+refD+' vehicles</h2>'+sumT
   +'<h2>Latency</h2><div class="grid">'+fig(imgs.lat,"(a) Mean end-to-end latency vs density.")+fig(imgs.p95,"(b) 95th-percentile latency - the tail that governs deadline compliance.")+'</div>'
   +fig(imgs.cdf,"(c) Latency CDF at "+refD+" veh, all RATs. 95th/99th percentiles are read off the upper tail.")
   +'<h2>Reliability &amp; load</h2><div class="grid">'+fig(imgs.pdr,"(d) PDR @150 m vs density.")+fig(imgs.cbr,"(e) Channel busy ratio vs density.")+'</div>'
   +fig(imgs.box,"(f) Per-RAT latency distribution (box: quartiles; whiskers: min/max).")
   +'<h2>Safety-relevant delivery</h2><div class="grid">'+fig(imgs.warn,"(g) Intersection Collision Warnings delivered before the braking deadline.")+fig(imgs.wdelay,"(h) Mean warning delivery delay by RAT.")+'</div>'
   +'<h2>Interpretation</h2><div class="note">Expected contrast (verify against the figures above): DSRC and NR-V2X provide millisecond access latency; LTE-V2X Mode 4 sits in the tens-of-milliseconds range with a heavier upper tail from persistent SPS resource collisions; PDR falls with NLOS distance and rising CBR for all RATs; the Hybrid PC5+Uu path trades higher latency for near-complete coverage because the network fills NLOS gaps. Because it is the latency <em>tail</em> (panel c) and the run-length of losses, not the mean, that decides whether a safety deadline is met, panels (b), (c) and (g) are the operative ones for collision avoidance.</div>'
   +'<h2>Full sweep data</h2>'+fullT+'<p><a class="dl" href="'+csvURI+'" download="v2x_comparison_data.csv">Download raw CSV</a></p>'
   +'<p class="meta">Parameters: mode-independent settings held constant - beacon '+P.beaconHz+' Hz, packet '+P.pktBytes+' B, awareness '+P.awareM+' m, Tx '+P.txDbm+' dBm, DCC/CR '+(P.dcc?"on":"off")+', RRI '+P.rriMs+' ms, blind-retx '+P.blindRetx+'.</p>'
   +'</body></html>';
  download("v2x_comparison_report.html",html,"text/html");
  uiLog({t:world.t,cls:"info",txt:"Comparison report generated ("+total+" runs, 8 figures)"});
}
/* ---- about / assumptions ---- */
const ASSUME=[
 ["Path loss (LOS)","22.7·log₁₀d + 41 + 20·log₁₀(fc/5) dB","WINNER+ B1 / 3GPP TR 37.885"],
 ["NLOS corner","+18 dB + slope·depth (cap 25)","Mangel & Hartenstein 2011"],
 ["Shadowing","log-normal σ 3/4 dB, AR(1) 25 m","3GPP TR 37.885"],
 ["Fast fading","Nakagami-m (3/2/1 by range)","Cheng 2007; Molina-Masegosa 2020"],
 ["DSRC MAC","802.11p EDCA, CSMA/CA, DCC","IEEE 802.11-2016; ETSI TS 102 687"],
 ["LTE-V2X","Mode 4 sensing SPS, RRI/probKeep","3GPP TS 36.213 §14; TR 36.885"],
 ["NR-V2X","Mode 2 dynamic + blind/HARQ retx","3GPP TS 38.214; TR 38.885"],
 ["V2N (Uu)","UL + MEC/cloud + DL, handover gap","3GPP TR 38.913; ETSI MEC 003"],
 ["Mobility","IDM car-following + MOBIL","Treiber 2000; Kesting 2007"],
 ["Safety app","CAM/DENM/SPaT/PSM, ICW/EEBL/VRU","SAE J2735 / J2945-1; ETSI EN 302 637-2"],
 ["Conflict metric","surrogate PET/TTC at conflict point","Allen 1978; ISO/TS 19091"],
];
const SIMPL=[
 "100 µs channel tick: one tick modelled as one 802.11p backoff slot (aggregation).",
 "Packet error via logistic SINR→PER mapping, not full BER/coding chain.",
 "NLOS uses a Manhattan-corner geometric model, not ray tracing.",
 "LTE/NR sidelink assumes aligned subframe/slot grid across nodes.",
 "Uu delivers as an idealised geo-broadcast within the awareness radius.",
 "RSU/BS links treated as LOS to the intersection.",
 "Weather at 5.9 GHz is mostly behavioural (speeds, phase) plus small excess loss.",
 "Not a replacement for ns-3/OMNeT++ full-stack simulation - a fast intuition tool.",
];
const ARCH_FE=[
 ["Renderer","2-D canvas viewport: pan/zoom, roads/lanes/crosswalks/buildings, signal heads, RSU/BS, vehicles & VRUs, packet-FX layer, packet-loss heat map, and an overview minimap."],
 ["Chart library","Dependency-free canvas plotting - time series, latency/PDR vs density, PDR vs distance, latency CDF, histogram, per-RAT box plots, safety bars."],
 ["UI shell","Auto-generated parameter panel, live KPI grid, vehicle inspector, event log, chart tabs, replay scrubber, and the density-sweep / one-click comparison-report exporters."],
 ["Rendering loop","requestAnimationFrame at display rate; simulation stepped by wall-clock × speed; KPIs/charts refreshed ~4 Hz."],
];
const ARCH_BE=[
 ["World engine","Quasi-discrete-event loop: channel tick 100 µs · mobility 20 ms · beacon generation 1 ms · app/safety/oracle 10 Hz · metrics 2 Hz. Seeded PRNG → reproducible."],
 ["Traffic / mobility","IDM car-following + MOBIL lane changes on a routed road network; four-phase signal control with pre-emption, RTOR and an all-way-stop arbiter; pedestrians/VRUs."],
 ["Channel","WINNER+/TR 37.885 path loss, corner-NLOS + urban canyon, NLOSv vehicle blockage, AR(1) log-normal shadowing, Nakagami-m fading; SINR→PER via a logistic map."],
 ["Access stacks","DSRC 802.11p EDCA CSMA/CA + DCC · LTE-V2X Mode 4 sensing-SPS · NR-V2X Mode 2 dynamic + HARQ · V2N Uu (eNB/gNB + MEC/cloud + handover). Common Comm bus + neighbour tables."],
 ["Safety application","SAE J2735 CAM/DENM/SPaT/PSM → ICW/EEBL/VRU/EVA; braking-deadline checks; a ground-truth Oracle scores missed/false warnings from true kinematics."],
 ["Metrics","Rolling-window PDR (by distance/density), latency/p95/jitter, CBR, goodput, loss decomposition, and surrogate-safety counters; CSV/JSON/PNG/report export."],
];
function buildAbout(){ const b=$("aboutBody");
  let h='<h2>About - V2X-ICAS</h2><p class="muted">An interactive testbed comparing DSRC (IEEE 802.11p) and C-V2X (LTE-V2X Mode 4, NR-V2X Mode 2, Hybrid PC5+Uu) for signalized-intersection collision avoidance. Single self-contained HTML file; no server, install or network required.</p>';
  h+='<h2>Model architecture - front end</h2><table class="insp"><tr><th>Component</th><th>Role</th></tr>';
  for(const a of ARCH_FE)h+='<tr><td>'+a[0]+'</td><td>'+a[1]+'</td></tr>'; h+='</table>';
  h+='<h2>Model architecture - back end (simulation engine)</h2><table class="insp"><tr><th>Component</th><th>Role</th></tr>';
  for(const a of ARCH_BE)h+='<tr><td>'+a[0]+'</td><td>'+a[1]+'</td></tr>'; h+='</table>';
  h+='<h2>Assumptions &amp; parameter sources</h2><table class="insp"><tr><th>Model</th><th>Formulation</th><th>Source</th></tr>';
  for(const a of ASSUME)h+='<tr><td>'+a[0]+'</td><td>'+a[1]+'</td><td>'+a[2]+'</td></tr>';
  h+='</table><h2>Simplifications</h2><ul>'; for(const s of SIMPL)h+='<li>'+s+'</li>'; h+='</ul>';
  h+='<p class="muted">Validated headless vs literature: DSRC ~1–3 ms, LTE-V2X ~30–60 ms, NR-V2X &lt;15 ms end-to-end at low load; PDR falls with NLOS distance and rising CBR. See README for full references.</p>';
  h+='<div class="about-footer">Designed by Krithik</div>';
  b.innerHTML=h; }
/* ---- folds & collapse ---- */
function wireFolds(){ document.querySelectorAll("h3[data-fold]").forEach(h=>{ if(h._wired)return; h._wired=1;
  h.onclick=()=>{ h.parentElement.classList.toggle("closed"); }; }); }
function updateHud(snap){ const hud=$("hud"); if(!hud||!world)return;
  hud.textContent=fms(world.t)+" s   ·   "+world.vehicles.length+" veh   ·   "+world.p.mode+"   ·   ×"+speedMult+"   ·   "+fps.toFixed(0)+" fps";
  const hm=$("hudMode"); if(hm){hm.textContent=world.p.mode; hm.style.background=C.MODE_COLOR[world.p.mode];}
  if($("miniTxt")&&snap)$("miniTxt").textContent="PDR "+fpct(snap.pdr)+" · "+fms(snap.lat)+" ms · CBR "+fpct(snap.cbr);
}
function frame(){ requestAnimationFrame(frame);
  const now=nowMs(), dt=Math.min(0.05,(now-lastFrame)/1000); lastFrame=now;
  fps=fps*0.9+(1/Math.max(1e-3,dt))*0.1;
  if(world){ if(playing&&replayIdx<0)world.step(dt*speedMult);
    if(replayIdx>=0&&world.snaps[replayIdx])R.drawSnapshot(world.snaps[replayIdx],world.p); else R.draw(world); }
  if(now-lastUI>230){ lastUI=now; if(world){ const snap=world.metrics.snapshot();
    updateKPIs(snap); updateInspector(); updateHud(snap); renderChart(); updateTimeline(); } }
}
function initUI(){
  R=new Renderer($("cv")); CH=new Chart($("chartCv"));
  R.onPick=v=>{ R.selected=v; if(world)world.selected=v; updateInspector(); };
  buildParams(); buildModes(); buildIntx(); buildScenarios(); buildKPIs(); buildTabs(); buildAbout(); wireFolds();
  resetWorld();
  $("btnPlay").onclick=()=>{ playing=!playing; $("btnPlay").textContent=playing?"⏸ Pause":"▶ Play";
    $("btnPlay").classList.toggle("on",playing); };
  $("btnStep").onclick=()=>{ if(world){setLive(true);world.step(0.1);} };
  $("btnReset").onclick=()=>{ resetWorld(); };
  $("rngSpeed").oninput=()=>{ speedMult=Math.pow(2,+$("rngSpeed").value); $("lblSpeed").textContent="×"+speedMult; };
  $("btnSweep").onclick=()=>runSweep();
  $("btnCancelSweep").onclick=()=>{ sweepCancel=true; };
  $("btnCsv").onclick=exportCSV; $("btnJson").onclick=exportJSON; $("btnPng").onclick=exportPNG;
  if($("btnReport"))$("btnReport").onclick=generateReport;
  $("btnFit").onclick=()=>R.fit(); $("btnZoomIn").onclick=()=>R.zoom(1.2); $("btnZoomOut").onclick=()=>R.zoom(1/1.2);
  $("btnAbout").onclick=()=>{ $("aboutModal").style.display="flex"; }; $("aboutClose").onclick=()=>{ $("aboutModal").style.display="none"; };
  $("btnLeft").onclick=()=>$("app").classList.toggle("no-left");
  $("btnRight").onclick=()=>$("app").classList.toggle("no-right");
  $("btnBottom").onclick=()=>$("app").classList.toggle("no-bottom");
  $("btnLive").onclick=()=>{ setLive(true); };
  $("scrub").oninput=()=>{ replayIdx=+$("scrub").value; setLive(false); };
  window.addEventListener("keydown",e=>{ if(e.target.tagName==="INPUT"||e.target.tagName==="SELECT")return;
    if(e.code==="Space"){e.preventDefault();$("btnPlay").click();}
    else if(e.key==="r"||e.key==="R")resetWorld(); else if(e.key==="f"||e.key==="F")R.fit(); });
  playing=true; $("btnPlay").textContent="⏸ Pause"; $("btnPlay").classList.add("on");
  $("lblSpeed").textContent="×"+speedMult; $("rngSpeed").value=Math.log2(speedMult);
  lastFrame=nowMs(); requestAnimationFrame(frame);
}

/* =====================================================================================
   SECTION 16 - boot : in a browser, initialise the UI on DOMContentLoaded. Under Node
   (no window), run a headless 4-mode smoke test that asserts the KPIs are finite and
   in physically plausible ranges - this is the self-validation harness.
   ===================================================================================== */
if(typeof window!=="undefined"){
  if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",initUI); else initUI();
}else{
  const modes=C.MODES; const f=(x,d=2)=>Number.isFinite(x)?x.toFixed(d):"NaN";
  let ok=true;
  console.log("V2X intersection simulator - headless smoke test (40 veh, 12 s/mode)");
  console.log("mode      pdr@50 pdr@150  lat(ms) p95(ms)  cbr    tx    confl warnOk crashes");
  for(const m of modes){ const {w,sum}=runHeadless({mode:m,nVeh:40},12,42);
    const b=w.metrics.dist, pd=i=>b[i].tot?b[i].ok/b[i].tot:NaN;
    console.log(m.padEnd(9),f(pd(0)).padStart(6),f(pd(2)).padStart(7),f(sum.lat,1).padStart(8),
      f(sum.p95,1).padStart(8),f(sum.cbr,3).padStart(6),String(sum.tx).padStart(6),
      String(sum.confl).padStart(5),String(sum.warnOk).padStart(6),String(sum.crashes).padStart(7));
    for(const key of ["pdr","lat","p95","cbr","tx"]) if(!Number.isFinite(sum[key])){ ok=false; console.log("  ASSERT FAIL: "+key+" not finite"); }
    if(pd(0)<0.5){ ok=false; console.log("  ASSERT FAIL: near-range PDR unexpectedly low"); }
  }
  console.log(ok?"\nAll assertions passed.":"\nSMOKE TEST FAILED.");
}
