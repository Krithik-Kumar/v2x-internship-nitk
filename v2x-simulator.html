<!doctype html>
<!--
=====================================================================================
 V2X-ICAS : DSRC vs C-V2X Intersection Collision-Avoidance Simulator     (v1.0, 2026)
=====================================================================================
 A self-contained, zero-dependency, browser-based discrete-time network and traffic
 micro-simulation comparing IEEE 802.11p DSRC, 3GPP LTE-V2X Mode 4 (Rel-14),
 3GPP NR-V2X Mode 2 (Rel-16) and a Hybrid PC5+Uu stack for signalized-intersection
 collision-avoidance applications (ICW / FCW / EEBL / VRU / EVA).

 Everything (engine, protocol models, renderer, chart library, UI) is in this ONE
 file. No CDN, no build step, no external libraries. Open it in any modern browser.

 Companion document: README.md  (user manual, model equations, assumptions table,
 literature anchors, export formats). Every non-obvious numeric constant in this
 file carries an inline citation to the standard or paper it was taken from.

 Fidelity note: this is a quasi-discrete-event abstraction (100 microsecond channel
 tick), NOT a bit-level ns-3 replacement. Section 9 of README.md lists every
 simplification explicitly.
=====================================================================================
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>V2X-ICAS - DSRC vs C-V2X Intersection Collision-Avoidance Simulator</title>
<style>

:root{

  --panel2:#eef0f3;        
  --border:#c3c7cd;

  --ink:#1b1e23;
  --muted:#5b6370;
  --accent:#0b5cad;      
  --ok:#0e7a3d;
  --warn:#9a6a12;
  --bad:#b3261e;
  --view-bg:#fbfbfc;
  --mono:"Consolas","SF Mono","DejaVu Sans Mono","Liberation Mono",monospace;
  --sans:"Segoe UI",system-ui,"Helvetica Neue",Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font:12px/1.45 var(--sans);color:var(--ink);background:var(--chrome);
  overflow:hidden; -webkit-font-smoothing:antialiased;
}
button,select,input{font:inherit;color:inherit}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#b9bec6;border:2px solid var(--panel)}
::-webkit-scrollbar-track{background:var(--panel)}

/* ---------- application grid ---------- */
#app{display:grid;height:100vh;height:100dvh;
  grid-template-rows:62px 1fr 264px;
  grid-template-columns:288px 1fr 312px;
  grid-template-areas:"tb tb tb" "lp vp rp" "bp bp bp";
}
#app.no-left{grid-template-columns:0 1fr 312px}
#app.no-right{grid-template-columns:288px 1fr 0}
#app.no-left.no-right{grid-template-columns:0 1fr 0}
#app.no-bottom{grid-template-rows:62px 1fr 26px}

.btn.primary:hover{background:#0a4f95}
.btn.small{padding:1px 6px;font-size:11px}
.seg{display:inline-flex;border:1px solid var(--border2);border-radius:2px;overflow:hidden}

select{background:#fdfdfe;border:1px solid var(--border2);border-radius:2px;padding:2px 4px}

<script>
"use strict";
/* =====================================================================================
   SECTION 1 - utils/  : deterministic RNG, math, statistics helpers
   ===================================================================================== */
const TAU = Math.PI*2, DEG = Math.PI/180;
function clamp(x,a,b){ return x<a?a:(x>b?b:x); }
function lerp(a,b,t){ return a+(b-a)*t; }
function hyp(dx,dy){ return Math.sqrt(dx*dx+dy*dy); }
function dbm2mw(d){ return Math.pow(10,d/10); }
function mw2dbm(m){ return 10*Math.log10(Math.max(m,1e-30)); }
/* mulberry32 - small, fast, seedable PRNG for reproducible runs */
function RNG(seed){ let a = seed>>>0;
  return function(){ a|=0; a=(a+0x6D2B79F5)|0; let t=Math.imul(a^(a>>>15),1|a);
    t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }; }
function gaussFactory(rand){ let spare=null;
  return function(mu=0,sd=1){ if(spare!==null){const v=spare;spare=null;return mu+sd*v;}
    let u,v,s; do{u=rand()*2-1;v=rand()*2-1;s=u*u+v*v;}while(s>=1||s===0);
    const m=Math.sqrt(-2*Math.log(s)/s); spare=v*m; return mu+sd*u*m; }; }
/* Gamma(k,theta) for integer-ish shape (used by Nakagami-m power fading, m in {1,2,3}) */
function gammaInt(rand,k){ let s=0; for(let i=0;i<k;i++) s-=Math.log(1-rand()); return s; }
function mean(a){ if(!a.length) return NaN; let s=0; for(const v of a) s+=v; return s/a.length; }
function std(a){ if(a.length<2) return 0; const m=mean(a); let s=0;
  for(const v of a) s+=(v-m)*(v-m); return Math.sqrt(s/(a.length-1)); }
function percentile(sorted,p){ if(!sorted.length) return NaN;
  const i=clamp((sorted.length-1)*p,0,sorted.length-1), lo=Math.floor(i);
  return lerp(sorted[lo],sorted[Math.min(lo+1,sorted.length-1)],i-lo); }
function quartiles(a){ const s=[...a].sort((x,y)=>x-y);
  return {min:s[0],q1:percentile(s,.25),med:percentile(s,.5),q3:percentile(s,.75),
          max:s[s.length-1],p95:percentile(s,.95)}; }
class Welford{ constructor(){this.n=0;this.m=0;this.s=0;}
  add(x){ this.n++; const d=x-this.m; this.m+=d/this.n; this.s+=d*(x-this.m); }
  get mean(){return this.n?this.m:NaN;}
  get sd(){return this.n>1?Math.sqrt(this.s/(this.n-1)):0;} }
class Ring{ constructor(n){this.a=new Float64Array(n);this.n=n;this.i=0;this.len=0;}
  push(v){this.a[this.i]=v;this.i=(this.i+1)%this.n;this.len=Math.min(this.len+1,this.n);}
  values(){const o=new Array(this.len);for(let k=0;k<this.len;k++)
    o[k]=this.a[(this.i-this.len+k+this.n*2)%this.n];return o;} }
const fmt=(x,d=1)=>Number.isFinite(x)?x.toFixed(d):"-";
const fms =x=>Number.isFinite(x)?(x<10?x.toFixed(2):x<100?x.toFixed(1):x.toFixed(0)):"-";
const fpct=x=>Number.isFinite(x)?(100*x).toFixed(1)+"%":"-";
function segInt(ax,ay,bx,by,cx,cy,dx,dy){ /* segment intersection -> [x,y] | null */
  const r1x=bx-ax,r1y=by-ay,r2x=dx-cx,r2y=dy-cy,den=r1x*r2y-r1y*r2x;
  if(Math.abs(den)<1e-9) return null;
  const t=((cx-ax)*r2y-(cy-ay)*r2x)/den, u=((cx-ax)*r1y-(cy-ay)*r1x)/den;
  if(t<0||t>1||u<0||u>1) return null; return [ax+t*r1x, ay+t*r1y, t];
}
function segRect(ax,ay,bx,by,r){ /* does segment intersect axis-aligned rect {x,y,w,h}? */
  const inX=(x)=>x>=r.x&&x<=r.x+r.w, inY=(y)=>y>=r.y&&y<=r.y+r.h;
  if((inX(ax)&&inY(ay))||(inX(bx)&&inY(by))) return true;
  return !!(segInt(ax,ay,bx,by,r.x,r.y,r.x+r.w,r.y)||segInt(ax,ay,bx,by,r.x,r.y+r.h,r.x+r.w,r.y+r.h)
        ||segInt(ax,ay,bx,by,r.x,r.y,r.x,r.y+r.h)||segInt(ax,ay,bx,by,r.x+r.w,r.y,r.x+r.w,r.y+r.h));
}

/* =====================================================================================
   SECTION 2 - config/  : physical constants, protocol profiles, defaults, presets
   Every value cites the standard / paper it came from. See README.md §6 for the table.

/* =====================================================================================
   SECTION 3 - traffic/network : road geometry, routes, conflict points, crosswalks
   Geometry: 4-way signalized intersection, 3 approach lanes per direction
   (lane0 = protected left, lane1 = through, lane2 = through + right), lane width
   3.5 m, 1 m median, stop line 15 m from center, crosswalks at 13 m, corner
   buildings for a Manhattan/urban-canyon layout (3GPP TR 36.885 urban grid style).
   Turning radii: right 5.75 m, left 17.25 m (AASHTO urban curb geometry).
   ===================================================================================== */
const NET = (function(){
  const LANE_X=[2.25,5.75,9.25], HALF=11, SSTOP=235, APLEN=250;
  const DIRS=["N","W","S","E"];                       // rotation order (90 deg CCW)
  const DVEC={N:[0,1],W:[-1,0],S:[0,-1],E:[1,0]};
  const rotP=(x,y,k)=>{for(let i=0;i<k;i++){const t=x;x=-y;y=t;}return [x,y];};

  function sampleBase(mv,lane){ // base frame = northbound
    const lx=LANE_X[lane], xs=[],ys=[];
    const push=(x,y)=>{xs.push(x);ys.push(y);};
    const straight=(x0,y0,x1,y1,st)=>{const L=hyp(x1-x0,y1-y0),n=Math.max(2,Math.ceil(L/st));
      for(let i=(xs.length?1:0);i<=n;i++)push(lerp(x0,x1,i/n),lerp(y0,y1,i/n));};
    push(lx,-APLEN);
    if(mv==="T"){ straight(lx,-APLEN,lx,APLEN,2); }
    else if(mv==="R"){ // NB -> EB, R=5.75, center (15,-15), ang pi -> pi/2 (clockwise)
      straight(lx,-APLEN,lx,-15,2); const r=5.75,cx=15,cy=-15,n=Math.ceil(r*Math.PI/2);
      for(let i=1;i<=n;i++){const a=Math.PI-(Math.PI/2)*(i/n);push(cx+r*Math.cos(a),cy+r*Math.sin(a));}
      straight(15,-9.25,APLEN,-9.25,2);
    } else { // L : NB -> WB, R=17.25, center (-15,-15), ang 0 -> pi/2 (CCW)
      straight(lx,-APLEN,lx,-15,2); const r=17.25,cx=-15,cy=-15,n=Math.ceil(r*Math.PI/2);
      for(let i=1;i<=n;i++){const a=(Math.PI/2)*(i/n);push(cx+r*Math.cos(a),cy+r*Math.sin(a));}
      straight(-15,2.25,-APLEN,2.25,2);
    }
    return {xs,ys};
  }
  const routes=[], byId={};
  for(let k=0;k<4;k++){
    const dir=DIRS[k];
    for(const [mv,lane] of [["L",0],["T",1],["T",2],["R",2]]){
      const b=sampleBase(mv,lane), xs=[],ys=[],cum=[0];
      for(let i=0;i<b.xs.length;i++){const [x,y]=rotP(b.xs[i],b.ys[i],k);xs.push(x);ys.push(y);
        if(i>0)cum.push(cum[i-1]+hyp(xs[i]-xs[i-1],ys[i]-ys[i-1]));}
      const exitBase={T:0,R:3,L:1}[mv];               // N,E,W in DIRS-index terms
      const exitDir=DIRS[(exitBase+k)%4];
      const arcLen= mv==="T"?0 : (mv==="R"?5.75:17.25)*Math.PI/2;
      const r={
        id:`${dir}-${mv}${lane}`, dir,mv,lane,xs,ys,cum,len:cum[cum.length-1],
        sStop:SSTOP, sBoxIn:SSTOP+0.01,
        sBoxOut: mv==="T"?265 : SSTOP+arcLen,
        group:(dir==="N"||dir==="S")?(mv==="L"?"NS_L":"NS_T"):(mv==="L"?"EW_L":"EW_T"),
        exitDir, exitLane: mv==="T"?lane:(mv==="R"?2:0),
        curveV: mv==="T"?Infinity:Math.sqrt(2.5*(mv==="R"?5.75:17.25)),  // a_lat = 2.5 m/s^2
        csAtExit:15, cw:[]
      };
      routes.push(r); byId[r.id]=r;
    }
  }
  function posAt(r,s){
    s=clamp(s,0,r.len); let lo=0,hi=r.cum.length-1;
    while(hi-lo>1){const m=(lo+hi)>>1; if(r.cum[m]<=s)lo=m;else hi=m;}
    const t=(s-r.cum[lo])/Math.max(r.cum[hi]-r.cum[lo],1e-9);
    const x=lerp(r.xs[lo],r.xs[hi],t), y=lerp(r.ys[lo],r.ys[hi],t);
    return {x,y,hd:Math.atan2(r.ys[hi]-r.ys[lo],r.xs[hi]-r.xs[lo])};
  }
  /* --- conflict points: pairwise path crossings inside the junction area --- */
  const conflicts=new Map();
  function segsNear(r){const o=[];for(let i=1;i<r.xs.length;i++){
    if(Math.max(Math.abs(r.xs[i]),Math.abs(r.ys[i]))<26||Math.max(Math.abs(r.xs[i-1]),Math.abs(r.ys[i-1]))<26)
      o.push([r.xs[i-1],r.ys[i-1],r.xs[i],r.ys[i],r.cum[i-1],r.cum[i]]);}return o;}
  const segCache=routes.map(segsNear);
  for(let a=0;a<routes.length;a++)for(let b=0;b<routes.length;b++){
    if(a===b||routes[a].dir===routes[b].dir)continue;
    let best=null;
    for(const s1 of segCache[a])for(const s2 of segCache[b]){
      const hit=segInt(s1[0],s1[1],s1[2],s1[3],s2[0],s2[1],s2[2],s2[3]);
      if(hit){const sA=lerp(s1[4],s1[5],hit[2]);
        // param along b:
        const db=hyp(hit[0]-s2[0],hit[1]-s2[1]), sB=s2[4]+db;
        if(!best||sA<best.sA)best={sA,sB,x:hit[0],y:hit[1]};}
    }
    if(best)conflicts.set(routes[a].id+":"+routes[b].id,best);
  }
  /* --- crosswalks --- */
  const crosswalks=[
    {id:"N",axis:"x",fixed: 13,span:11.5,walkGrp:"EW_T"},
    {id:"S",axis:"x",fixed:-13,span:11.5,walkGrp:"EW_T"},
    {id:"E",axis:"y",fixed: 13,span:11.5,walkGrp:"NS_T"},
    {id:"W",axis:"y",fixed:-13,span:11.5,walkGrp:"NS_T"}];
  for(const r of routes)for(const cw of crosswalks){
    for(let i=0;i<r.xs.length;i++){
      const f = cw.axis==="x"? r.ys[i] : r.xs[i];
      const al= cw.axis==="x"? r.xs[i] : r.ys[i];
      if(Math.abs(f-cw.fixed)<0.9&&Math.abs(al)<=cw.span){
        r.cw.push({cw,s:r.cum[i],along:al});break;}
    }
  }
  /* --- corner buildings (LOS obstacles) + decorative geometry --- */
  const B=(x,y,w,h,tall)=>({x,y,w,h,tall:!!tall});
  const obstacles=[
    B( 17, 17,42,66,1),B( 63, 17,44,40),B( 17, 87,34,26),
    B(-59, 17,42,66,1),B(-107,17,44,40),B(-51, 87,34,26),
    B(-59,-83,42,66,1),B(-107,-57,44,40),B(-51,-113,34,26),
    B( 17,-83,42,66,1),B( 63,-57,44,40),B( 17,-113,34,26)];
  const deco=[B(115,17,60,50),B(-175,17,60,50),B(115,-67,60,50),B(-175,-67,60,50),
              B(17,125,50,60),B(-67,125,50,60),B(17,-185,50,60),B(-67,-185,50,60)];
  const trees=[]; for(let d=30;d<=235;d+=22){for(const s of[1,-1]){
    trees.push([ 13.8, s*d]);trees.push([-13.8, s*d]);trees.push([s*d, 13.8]);trees.push([s*d,-13.8]);}}
  const signs=[{x:14.8,y:-70,rot:0},{x:-14.8,y:70,rot:180},{x:-70,y:-14.8,rot:90},{x:70,y:14.8,rot:270}];
  const rsuSites=[[13.5,13.5],[-13.5,-13.5],[-13.5,13.5],[13.5,-13.5]];
  const bsSites=[[190,150],[-190,-150]];
  return {routes,byId,posAt,conflicts,crosswalks,obstacles,deco,trees,signs,rsuSites,bsSites,
          HALF,SSTOP,APLEN,LANE_X,DVEC,
          conflictOf:(ra,rb)=>conflicts.get(ra+":"+rb)};
})();

/* =====================================================================================
   SECTION 4 - traffic/signals : 4-phase dual-ring-equivalent controller
   Phase order: NS-left(prot) -> NS-through(+right) -> EW-left -> EW-through.
   Yellow 3.0 s, all-red 1.5 s (MUTCD/ITE change intervals for 50 km/h approach).
   Pedestrian WALK runs with the parallel through phase (first 60 %), then flashing.
   ===================================================================================== */
class Signals{
  constructor(cycleS){this.Y=3.0;this.AR=1.5;this.dark=false;
    this.phases=["NS_L","NS_T","EW_L","EW_T"];this.i=1;this.t=0;
    this.force=null;this.setCycle(cycleS);}
  setCycle(c){const lost=4*(this.Y+this.AR),g=Math.max(20,c-lost);
    this.g={NS_L:g*0.16,NS_T:g*0.34,EW_L:g*0.16,EW_T:g*0.34};}
  tick(dt){ if(this.dark)return;
    const dur=this.g[this.phases[this.i]]+this.Y+this.AR;
    this.t+=dt;
    if(this.force){ // emergency-vehicle pre-emption (green truncate -> Y -> AR -> hold)
      if(this.phases[this.i]===this.force){this.t=Math.min(this.t,this.g[this.phases[this.i]]*0.5);return;}
      if(this.t<this.g[this.phases[this.i]])this.t=this.g[this.phases[this.i]]; // jump to yellow
      if(this.t>=dur){this.i=this.phases.indexOf(this.force);this.t=0;}
      return;}
    if(this.t>=dur){this.t-=dur;this.i=(this.i+1)%4;}
  }
  stateOf(grp){ if(this.dark)return "DARK";
    if(this.phases[this.i]!==grp)return "R";
    return this.t<this.g[grp]?"G":(this.t<this.g[grp]+this.Y?"Y":"R");}
  stateFor(route){return this.stateOf(route.group);}
  pedState(cw){ if(this.dark)return "D";
    const st=this.stateOf(cw.walkGrp); if(st!=="G")return "D";
    return this.t<this.g[cw.walkGrp]*0.6?"W":"F";}
  preempt(grp){this.force=grp;} release(){this.force=null;}
  countdown(){const grp=this.phases[this.i],dur=this.g[grp]+this.Y+this.AR;

/* =====================================================================================
   SECTION 5 - vehicle/ + physics/ : IDM car-following, MOBIL lane changes,

let __ID=1;
class Vehicle{
  constructor(w,route,type,opts={}){
    const tp=C.VTYPES[type];
    this.id=__ID++; this.kind="veh"; this.type=type; this.tp=tp;
    this.route=route; this.s=0; this.v=Math.min(9,w.vmax*tp.v0f); this.a=0;
    this.len=tp.l; this.wid=tp.w;
    this.isViol=!!opts.viol; this.isEV=!!opts.ev; this.crashed=false; this.crashT=0;
    this.risk=0; this.brakeCmd=null; this.fcwT=-9; this.eeblT=-9; this.hazards=new Map();
    this.stopT=0; this.awsGo=false; this.rtorT=0; this.laneOff=0;
    this.knownPeds=new Set(); this.pedAlertT=-9;
    this.trail=[]; this.x=0;this.y=0;this.hd=0; this.updPos();
    this.scriptBrakeUntil=-1;
    this.lastGen=w.t-w.rand()*(1/Math.max(1,w.p.beaconHz));
    this.cautionT=-9;this.evCareT=-9;this.riskT=-9;this.brakeCmd=null;
    this.rtorGo=false;this.lcT=-9;this.persist=false;this.lastEva=-9;this.lastTrail=-9;
  }
  updPos(){const p=NET.posAt(this.route,this.s);this.x=p.x;this.y=p.y;this.hd=p.hd;}
  v0eff(w){ let v0=w.vmax*this.tp.v0f*(this.isEV?1.25:1);
    const r=this.route;
    if(r.curveV<v0){ // decelerate smoothly into the turn (comfort decel b)
      if(this.s<r.sStop) v0=Math.min(v0,Math.sqrt(r.curveV*r.curveV+2*this.tp.b*Math.max(0,r.sStop-this.s)));
      else if(this.s<r.sBoxOut) v0=r.curveV;
    }
    return Math.max(v0,1);
  }
  idm(gap,dv,v0,w){ // returns acceleration for one constraint
    const A=this.tp.a*w.p.idmA/1.8, B=this.tp.b*w.p.idmB/2.6;
    const sStar=C.IDM.s0+Math.max(0,this.v*w.p.idmT+this.v*dv/(2*Math.sqrt(A*B)));
    const free=A*(1-Math.pow(this.v/v0,C.IDM.delta));
    if(gap===Infinity)return free;
    return free - A*Math.pow(sStar/Math.max(gap,0.2),2);
  }
}
class Pedestrian{
  constructor(w,cw,side,jay){
    this.id=__ID++; this.kind="ped"; this.cw=cw; this.jay=jay;
    this.dir=side; this.prog=-side*(cw.span+1.8);
    this.v=Math.max(0.7,w.gauss(1.34,0.26));  // Weidmann walking-speed distribution
    this.waiting=!jay; this.done=false; this.connected=w.rand()<0.7; // VRU device share
    this.lastGen=w.t-w.rand()*1.0; this.updPos();
  }
  updPos(){ if(this.cw.axis==="x"){this.x=this.prog;this.y=this.cw.fixed;}
            else{this.x=this.cw.fixed;this.y=this.prog;} }
}
class Traffic{
  constructor(w){this.w=w;this.corridors=new Map();this.mobilT=0;
    this.spawnAcc=0;this.pedAcc=0;}
  corridorKey(v){const r=v.route;
    if(v.s<r.sBoxIn)return "A:"+r.dir+r.lane;
    if(v.s<r.sBoxOut)return "B:"+r.id;
    return "X:"+r.exitDir+r.exitLane;}
  axisCs(v){const dv=NET.DVEC[v.route.exitDir];return v.x*dv[0]+v.y*dv[1];}
  rebuild(){const m=this.corridors;m.clear();
    for(const v of this.w.vehicles){const k=this.corridorKey(v);

      v._ck=k; v._cs=cs;

    return "car";}
  spawn(dir,mv,opts={}){const w=this.w;
    const lane= mv==="L"?0:(mv==="R"?2:(w.rand()<0.5?1:2));
    const route=NET.byId[`${dir}-${mv}${lane}`];
    if(!route)return null;
    if(w.p.intx==="tee" && (dir==="N" || route.exitDir==="N"))return null;  // north arm absent
    const ck="A:"+dir+lane; const arr=this.corridors.get(ck);

  spawnTick(dt){const w=this.w;

    while(this.spawnAcc>1){this.spawnAcc-=1;
      const dir=dirs[(w.rand()*dirs.length)|0];

        if(!cand.length)continue; if(!cand.includes(mv))mv=cand[(w.rand()*cand.length)|0]; }

    // pedestrians

        const cw=NET.crosswalks[(w.rand()*4)|0], side=w.rand()<0.5?1:-1;

  /* --- MOBIL discretionary lane change between the two through lanes --- */
  mobil(v,t){ const w=this.w;
    if(v.crashed||v.route.mv!=="T"||v._ck[0]!=="A")return;
    if(v.s>v.route.sStop-15||t-v.lcT<4)return;
    const cur=v.route.lane, other=cur===1?2:1;
    const alt=NET.byId[`${v.route.dir}-T${other}`]; if(!alt)return;
    const altArr=this.corridors.get("A:"+v.route.dir+other)||[];
    let lead=null,fol=null;
    for(const c of altArr){ if(c.s>v.s){ if(!lead||c.s<lead.s)lead=c; }
      else { if(!fol||c.s>fol.s)fol=c; } }
    const v0=v.v0eff(w);

    const aNew=this.accFor(v,lead,gapAlt,v0);

      const gBefore= lead? lead.s-fol.s-(lead.len+fol.len)/2 : Infinity;

      v.route=alt; v.updPos();
      const perp=[-Math.sin(v.hd),Math.cos(v.hd)];

  /* --- collisions: broad-phase distance then OBB SAT --- */

    for(const v of V){ if(v.crashed)continue;

  /* --- main mobility step (called at 50 Hz) --- */
  step(t,dt){ const w=this.w;
    for(let i=w.vehicles.length-1;i>=0;i--){const v=w.vehicles[i];
      if(v.s>v.route.len-1.5){ w.comm.detach(v); w.vehicles.splice(i,1); }}

    for(const v of w.vehicles){ const r=v.route;
      if(v.crashed){ v._a=0; continue; }

      if(t-v.cautionT<2.0)v0*=0.85;

      if(r.mv==="R" && !v.rtorGo && st!=="G" && st!=="DARK"){ const d=r.sStop-v.s;

      if(v.brakeCmd){ if(t>=v.brakeCmd.at&&t<v.brakeCmd.until)a=Math.min(a,-v.brakeCmd.dec);
        if(t>=v.brakeCmd.until)v.brakeCmd=null; }

    if(w.signals.dark){
      let boxOcc=false;
      for(const v of w.vehicles){ if(v.s>v.route.sStop&&v.s<v.route.sBoxOut){boxOcc=true;break;} }
      if(!boxOcc && t-w.lastGrant>0.7){ let pick=null;
        for(const v of w.vehicles){ if(v.awsGo||v.stopT===0||v.s>v.route.sBoxOut)continue;
          if(!pick||v.stopT<pick.stopT)pick=v; }
        if(pick){ pick.awsGo=true; w.lastGrant=t; } }
      for(const v of w.vehicles){ if(v.awsGo&&v.s>v.route.sBoxOut){v.awsGo=false;v.stopT=0;} }
    }

    if(t-this.mobilT>=0.5){ this.mobilT=t; for(const v of w.vehicles)this.mobil(v,t); }

    for(const v of w.vehicles){ if(v.crashed){v.v=0;continue;}

      v.s+=Math.max(0,v.v*dt+0.5*a*dt*dt); v.updPos();

    for(let i=w.peds.length-1;i>=0;i--){ const p=w.peds[i];

      if(p.done||p.dir*p.prog>p.cw.span+1.8){ if(p.connected)w.comm.detach(p); w.peds.splice(i,1); }

  }
}
/* --- oriented-bounding-box helpers (separating-axis theorem) --- */
function obbOverlap(a,b){
  const au=[Math.cos(a.hd),Math.sin(a.hd)], av=[-Math.sin(a.hd),Math.cos(a.hd)];
  const bu=[Math.cos(b.hd),Math.sin(b.hd)], bv=[-Math.sin(b.hd),Math.cos(b.hd)];
  const dx=b.x-a.x, dy=b.y-a.y;
  const ah=a.len/2,aw=a.wid/2,bh=b.len/2,bw=b.wid/2;
  for(const ax of [au,av,bu,bv]){
    const dist=Math.abs(dx*ax[0]+dy*ax[1]);
    const ra=ah*Math.abs(ax[0]*au[0]+ax[1]*au[1])+aw*Math.abs(ax[0]*av[0]+ax[1]*av[1]);
    const rb=bh*Math.abs(ax[0]*bu[0]+ax[1]*bu[1])+bw*Math.abs(ax[0]*bv[0]+ax[1]*bv[1]);
    if(dist>ra+rb)return false;
  }
  return true;
}
function pointInObb(px,py,v){ const dx=px-v.x,dy=py-v.y;
  const lu=dx*Math.cos(v.hd)+dy*Math.sin(v.hd);
  const lw=-dx*Math.sin(v.hd)+dy*Math.cos(v.hd);
  return Math.abs(lu)<=v.len/2+0.3 && Math.abs(lw)<=v.wid/2+0.3;
}

/* =====================================================================================
   SECTION 6 - channel/ : large-scale path loss (WINNER+ B1), corner NLOS, NLOSv
   vehicle blockage, AR(1) log-normal shadowing, Nakagami-m fast fading.
   Gains are cached per node-pair per 10 Hz epoch; shadowing evolves as an AR(1)
   process decorrelated over distance (README §6, §9.2).
   ===================================================================================== */
class Channel{
  constructor(w){ this.w=w; const N=this.N=192;
    this.sh=new Float32Array(N*N); this.shInit=new Uint8Array(N*N);
    this.stamp=new Int32Array(N*N); this.lx=new Float32Array(N*N); this.ly=new Float32Array(N*N);
    this.epoch=1; this.nsList=[]; this.ewList=[]; }
  refresh(){ this.epoch++;
    const V=this.w.vehicles;
    this.nsList=V.filter(v=>Math.abs(v.x)<12).sort((a,b)=>a.y-b.y);
    this.ewList=V.filter(v=>Math.abs(v.y)<12).sort((a,b)=>a.x-b.x); }
  losBlocked(x1,y1,x2,y2){ for(const o of NET.obstacles){
    if(segRect(x1,y1,x2,y2,o))return true; } return false; }
  vehBlockDb(a,b){ if(!this.w.p.blockage)return 0; let db=0;
    if(Math.abs(a.y)<12&&Math.abs(b.y)<12&&Math.abs(a.y-b.y)<8){
      const lo=Math.min(a.x,b.x),hi=Math.max(a.x,b.x),mid=(a.y+b.y)/2;
      for(const v of this.ewList){ if(v===a||v===b)continue; if(v.x<=lo||v.x>=hi)continue;
        if(Math.abs(v.y-mid)<1.6)db+=(v.len>6?C.PROP.blockBig:C.PROP.blockCar); }
    } else if(Math.abs(a.x)<12&&Math.abs(b.x)<12&&Math.abs(a.x-b.x)<8){
      const lo=Math.min(a.y,b.y),hi=Math.max(a.y,b.y),mid=(a.x+b.x)/2;
      for(const v of this.nsList){ if(v===a||v===b)continue; if(v.y<=lo||v.y>=hi)continue;
        if(Math.abs(v.x-mid)<1.6)db+=(v.len>6?C.PROP.blockBig:C.PROP.blockCar); }
    }
    return Math.min(C.PROP.blockCap,db); }
  shadow(a,b,blocked){ let i=a.ci,j=b.ci; if(i<0||j<0)return 0;
    if(i>j){const t=i;i=j;j=t;} const k=i*this.N+j;
    const sigma=(blocked?C.PROP.shadNlos:C.PROP.shadLos)+(this.w.p.weather==="rain"?0.5:0);
    const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
    if(!this.shInit[k]){ this.sh[k]=this.w.gauss(0,sigma); this.shInit[k]=1;
      this.lx[k]=mx; this.ly[k]=my; this.stamp[k]=this.epoch; return this.sh[k]; }
    if(this.stamp[k]!==this.epoch){
      const moved=hyp(mx-this.lx[k],my-this.ly[k]);
      const rho=Math.exp(-moved/C.PROP.shadCorr);
      this.sh[k]=rho*this.sh[k]+Math.sqrt(1-rho*rho)*this.w.gauss(0,sigma);
      this.lx[k]=mx; this.ly[k]=my; this.stamp[k]=this.epoch; }
    return this.sh[k]; }
  gain(a,b){ const d=Math.max(1,hyp(a.x-b.x,a.y-b.y));
    const rsuLike=a.kind==="rsu"||b.kind==="rsu";
    const blocked=rsuLike?false:this.losBlocked(a.x,a.y,b.x,b.y);
    let pl=C.PROP.losA*Math.log10(d)+C.PROP.losB+20*Math.log10(C.PHY.fcGHz/5);
    if(blocked){ const dA=Math.max(0,Math.max(Math.abs(a.x),Math.abs(a.y))-NET.HALF);
      const dB=Math.max(0,Math.max(Math.abs(b.x),Math.abs(b.y))-NET.HALF);
      pl+=C.PROP.cornerLoss+(this.w.p.canyon?8:0)+Math.min(C.PROP.nlosCap,C.PROP.nlosSlope*Math.min(dA,dB)); }
    if(!rsuLike)pl+=this.vehBlockDb(a,b);
    if(this.w.p.weather==="rain")pl+=1.2; else if(this.w.p.weather==="fog")pl+=0.4;
    pl+=this.shadow(a,b,blocked);
    return -pl; }
  fadeDb(d){ if(!this.w.p.fading)return 0;
    const m=d<C.PROP.nakaD1?C.PROP.nakaNear:(d<C.PROP.nakaD2?C.PROP.nakaMid:C.PROP.nakaFar);
    const g=gammaInt(this.w.rand,m);
    return 10*Math.log10(Math.max(1e-3,g/m)); }
  rxDbm(tx,rx){ return this.w.p.txDbm+2*C.PHY.antGain+this.gain(tx,rx)+this.fadeDb(hyp(tx.x-rx.x,tx.y-rx.y)); }
  noiseDbm(bwMHz){ return C.PHY.thermal+10*Math.log10(bwMHz*1e6)+C.PHY.noiseFig; }
}

/* =====================================================================================
   SECTION 7 - metrics/ : PDR (by distance & density), latency/jitter, CBR, throughput,
   warning timeliness, surrogate safety counters. A rolling 10-bucket (0.5 s) window
   drives the live KPIs; a reservoir feeds CDF/box plots. (README §5 metric defs.)
   ===================================================================================== */
class Metrics{
  constructor(w){ this.w=w; this.reg=new Map();
    this.win=[]; for(let i=0;i<10;i++)this.win.push({exp:0,del:0,by:0}); this.wi=0;
    this.cnt={gen:0,tx:0,rxOk:0,rxRange:0,rxSinr:0,rxHd:0,retx:0,drop:0,uuTx:0,uuOk:0,uuLoss:0};
    this.latWin=new Ring(4096); this.res=[]; this.jit=0; this.lastLat=null;
    this.dist=[]; for(let i=0;i<8;i++)this.dist.push({ok:0,tot:0});
    this.densAcc=new Map();
    this.safety={confl:0,warned:0,miss:0,falseW:0,avoided:0,lucky:0,crashes:0,pedHit:0,
      warnOk:0,warnLate:0,wDelay:new Welford(),minTTC:Infinity,evPre:0};
    this.falseCd=new Map(); this.series=[]; this.seriesCap=2400; }
  curWin(){ return this.win[this.wi]; }
  trackPkt(pkt,targets){ this.cnt.gen++;
    this.reg.set(pkt.pid,{t:pkt.tGen,kind:pkt.kind,targets,got:new Set(),deadline:pkt.deadline,src:pkt.src});
    this.curWin().exp+=targets.length;
    const key=this.w.p.mode+"|"+(Math.round(this.w.vehicles.length/10)*10);
    let da=this.densAcc.get(key); if(!da){da={lat:new Welford(),de:0,ex:0};this.densAcc.set(key,da);}
    da.ex+=targets.length;
    for(const tg of targets){ this.dist[Math.min(7,(tg.d/50)|0)].tot++; } }
  onDecode(pkt,rxId,tech){ const r=this.reg.get(pkt.pid); if(!r||r.got.has(rxId))return;
    let tgt=null; for(const t of r.targets){ if(t.id===rxId){tgt=t;break;} }
    if(!tgt)return; r.got.add(rxId); this.cnt.rxOk++;
    const lat=(this.w.t-r.t)*1000;
    const wv=this.curWin(); wv.del++; wv.by+=pkt.bytes;
    this.dist[Math.min(7,(tgt.d/50)|0)].ok++;
    this.latWin.push(lat);
    if(this.res.length<20000)this.res.push(lat); else this.res[(this.w.rand()*this.res.length)|0]=lat;
    if(this.lastLat!==null)this.jit+=(Math.abs(lat-this.lastLat)-this.jit)/16;
    this.lastLat=lat;
    const key=this.w.p.mode+"|"+(Math.round(this.w.vehicles.length/10)*10);
    let da=this.densAcc.get(key); if(da){ da.lat.add(lat); da.de++; }
    this.w.heatAt(tgt.x,tgt.y,true);
    if(r.kind==="ICW"){ if(this.w.t<=r.deadline)this.safety.warnOk++; else this.safety.warnLate++;
      this.safety.wDelay.add(lat); } }
  gc(){ const now=this.w.t;
    for(const [pid,r] of this.reg){ if(now-r.t>1.0){
      for(const tg of r.targets){ if(!r.got.has(tg.id))this.w.heatAt(tg.x,tg.y,false); }
      this.reg.delete(pid); } } }
  noteFalse(key){ const last=this.falseCd.get(key)||-9;
    if(this.w.t-last>5){ this.safety.falseW++; this.falseCd.set(key,this.w.t); } }
  pdrAtDist(m){ const mm=Math.min(m,this.w.p.awareM);
    const d=this.dist[Math.min(7,Math.max(0,Math.floor((mm-1)/50)))]; return d.tot?d.ok/d.tot:NaN; }
  sample(t){ let exp=0,del=0,by=0; for(const w of this.win){exp+=w.exp;del+=w.del;by+=w.by;}
    const lv=this.latWin.values(), ls=[...lv].sort((a,b)=>a-b);
    const V=this.w.vehicles;
    this.series.push({t, pdr:exp?del/exp:NaN, lat:lv.length?mean(lv):NaN,
      p95:lv.length?percentile(ls,.95):NaN, jit:this.jit, cbr:this.w.comm.avgCbr(),
      thr:by*8/1000/5, nveh:V.length, vavg:V.length?mean(V.map(v=>v.v)):NaN});
    if(this.series.length>this.seriesCap)this.series.shift();
    this.wi=(this.wi+1)%10; const nb=this.win[this.wi]; nb.exp=nb.del=nb.by=0; }
  snapshot(){ let exp=0,del=0,by=0; for(const w of this.win){exp+=w.exp;del+=w.del;by+=w.by;}
    const lv=this.latWin.values(), ls=[...lv].sort((a,b)=>a-b), s=this.safety, V=this.w.vehicles;
    return { mode:this.w.p.mode, t:this.w.t, nveh:V.length,
      pdr:exp?del/exp:NaN, lat:lv.length?mean(lv):NaN,
      p50:lv.length?percentile(ls,.5):NaN, p95:lv.length?percentile(ls,.95):NaN,
      p99:lv.length?percentile(ls,.99):NaN, jit:this.jit, cbr:this.w.comm.avgCbr(),
      thr:by*8/1000/5, gen:this.cnt.gen, tx:this.cnt.tx, rxOk:this.cnt.rxOk,
      lossRange:this.cnt.rxRange, lossSinr:this.cnt.rxSinr, lossHd:this.cnt.rxHd,
      retx:this.cnt.retx, drop:this.cnt.drop, uuOk:this.cnt.uuOk, uuLoss:this.cnt.uuLoss,
      confl:s.confl, warned:s.warned, miss:s.miss, falseW:s.falseW, avoided:s.avoided,
      lucky:s.lucky, crashes:s.crashes, pedHit:s.pedHit, warnOk:s.warnOk, warnLate:s.warnLate,
      wDelay:s.wDelay.mean, minTTC:s.minTTC===Infinity?NaN:s.minTTC, evPre:s.evPre,
      pdr150:this.pdrAtDist(150), vavg:V.length?mean(V.map(v=>v.v)):NaN }; }
  resetCounters(){ for(const k in this.cnt)this.cnt[k]=0;
    for(const w of this.win){w.exp=w.del=w.by=0;} this.reg.clear();
    this.latWin=new Ring(4096); this.res=[]; this.jit=0; this.lastLat=null;
    for(const d of this.dist){d.ok=d.tot=0;} this.densAcc.clear();
    this.safety={confl:0,warned:0,miss:0,falseW:0,avoided:0,lucky:0,crashes:0,pedHit:0,
      warnOk:0,warnLate:0,wDelay:new Welford(),minTTC:Infinity,evPre:0};
    this.series.length=0; }
}

/* =====================================================================================
   SECTION 8 - mac/dsrc : IEEE 802.11p EDCA broadcast MAC. CSMA/CA with AIFS + random
   backoff, energy-detect carrier sense, hidden-terminal-aware SINR at each receiver,
   logistic PER, half-duplex, ETSI reactive DCC. One 100 us tick == one backoff slot
   (documented aggregation, README §9.1); overlapping transmissions collide via SINR.
   ===================================================================================== */
class DsrcMac{
  constructor(w){ this.w=w; this.nodes=[]; this.active=[]; this.tk=0; }
  attach(n){ n.dsrc={q:[],bo:-1,idle:0,cbr:0,rate:this.w.p.beaconHz}; this.nodes.push(n); }
  detach(n){ const i=this.nodes.indexOf(n); if(i>=0)this.nodes.splice(i,1);
    this.active=this.active.filter(a=>a.n!==n); n.dsrc=null; }
  enqueue(n,pkt){ const d=n.dsrc; if(!d)return;
    if(pkt.kind==="CAM"||pkt.kind==="SPAT"||pkt.kind==="PSM")
      for(let i=d.q.length-1;i>=0;i--)if(d.q[i].kind===pkt.kind)d.q.splice(i,1);
    if(d.q.length>=8){ this.w.metrics.cnt.drop++; if(pkt.prio===1)d.q.pop(); else return; }
    if(pkt.prio===1)d.q.unshift(pkt); else d.q.push(pkt); }
  rateFor(n){ if(!this.w.p.dcc)return this.w.p.beaconHz;
    const cbr=n.dsrc?n.dsrc.cbr:0;
    for(const row of C.DSRC.dcc){ if(cbr<row.cbr)return Math.min(row.rate,this.w.p.beaconHz); }
    return 1; }
  startTx(n,t){ const d=n.dsrc, pkt=d.q.shift(); if(!pkt)return;
    this.w.comm.trackFirst(pkt,n);
    const air=Math.max(2,Math.round((C.DSRC.preambleUs+pkt.bytes*8/C.DSRC.rateMbps)/100));
    n.txBusyUntil=t+air*C.TICK;
    this.active.push({n,pkt,t0:t,until:t+air*C.TICK});
    this.w.metrics.cnt.tx++; d.bo=-1;
    if(this.w.fx)this.w.fx.ripple(n.x,n.y,pkt.kind); }
  tick(t){ const nodes=this.nodes, chan=this.w.chan, M=this.w.metrics;
    /* 1. resolve transmissions ending this tick */
    if(this.active.length){ const ending=this.active.filter(a=>t>=a.until);
      for(const a of ending){
        const interf=this.active.filter(o=>o!==a && o.t0<a.until && o.until>a.t0);
        for(const rx of nodes){ if(rx===a.n)continue;
          if(rx.txBusyUntil>a.t0){ M.cnt.rxHd++; continue; }
          const rss=chan.rxDbm(a.n,rx);
          if(rss<C.DSRC.sensDbm){ M.cnt.rxRange++; continue; }
          let nMw=dbm2mw(chan.noiseDbm(10)); if(this.w.bgBusyNow)nMw+=dbm2mw(-82);
          for(const o of interf)nMw+=dbm2mw(chan.rxDbm(o.n,rx));
          const sinr=rss-mw2dbm(nMw);
          const ps=1/(1+Math.exp(-(sinr-C.DSRC.sinrMid)/C.DSRC.sinrSlope));
          if(this.w.rand()<ps){ this.w.comm.deliver(a.pkt,a.n,rx,t,'PC5');
            rx.lastRssi=rss; rx.lastSinr=sinr; }
          else M.cnt.rxSinr++;
        } }
      if(ending.length)this.active=this.active.filter(a=>t<a.until);
    }
    /* 2. CSMA/CA - one tick == one backoff slot */
    const ready=[];
    for(const n of nodes){ const d=n.dsrc; if(!d||n.txBusyUntil>t||!d.q.length)continue;
      let busy=this.w.bgBusyNow;
      if(!busy)for(const a of this.active){ if(a.n!==n&&chan.rxDbm(a.n,n)>C.DSRC.csDbm){busy=true;break;} }
      if(busy){ d.idle=0; if(d.bo<0)d.bo=Math.floor(this.w.rand()*(C.DSRC.cwMin+1)); continue; }
      d.idle++; if(d.bo<0)d.bo=Math.floor(this.w.rand()*(C.DSRC.cwMin+1));
      ready.push(n); }
    for(const n of ready){ const d=n.dsrc; if(d.bo>0){ d.bo--; continue; } this.startTx(n,t); }
    /* 3. CBR estimate every 1 ms (EMA ~100 ms) */
    if(this.tk%10===0){ for(const n of nodes){ const d=n.dsrc; if(!d)continue;
      let busy=this.w.bgBusyNow?1:0;
      if(!busy)for(const a of this.active){ if(a.n!==n&&chan.rxDbm(a.n,n)>C.DSRC.csDbm){busy=1;break;} }
      d.cbr+=(busy-d.cbr)*0.01; } }
    this.tk++;
  }
  avgCbr(){ if(!this.nodes.length)return 0; let s=0,c=0;
    for(const n of this.nodes){ if(n.dsrc){s+=n.dsrc.cbr;c++;} } return c?s/c:0; }
}

/* =====================================================================================
   SECTION 9 - mac/sidelink : C-V2X PC5 resource pool shared by LTE-V2X Mode 4 (Rel-14
   sensing-based SPS, 3GPP TS 36.213 §14) and NR-V2X Mode 2 (Rel-16, TS 38.214 §8).
   Models subchannel selection, sensing-window exclusion by decoded SCI reservations,
   RSRP-ranked candidate set, reselection counter, half-duplex, blind/HARQ retx, and
   NR groupcast PSFCH feedback retransmission for priority warnings. Persistent SPS
   collisions (same phase+subchannel, mutual half-duplex blindness) emerge naturally.
   ===================================================================================== */
class SidelinkPool{
  constructor(w,prof,name){ this.w=w; this.prof=prof; this.name=name;
    this.dyn=(name==="NR");
    this.slotTicks=Math.max(1,Math.round(prof.slotMs*10));
    this.nSub=Math.max(1,prof.subCh*(w.p.bwMHz/10));
    this.nOpt=Math.max(1,this.nSub-prof.chPerPkt+1);
    this.rriSlots=Math.max(1,Math.round((name==="NR"?(1000/Math.max(1,w.p.beaconHz)):w.p.rriMs)/prof.slotMs));
    this.nodes=[]; this.slotNo=0; this.tk=0; this.pending=[]; this.retxQ=[];
    this.noiseFloor=w.chan.noiseDbm(w.p.bwMHz); this.occ=0; }
  attach(n){ n.sl={q:[],grant:null,known:new Map(),cbr:0}; this.nodes.push(n); }
  detach(n){ const i=this.nodes.indexOf(n); if(i>=0)this.nodes.splice(i,1);
    this.pending=this.pending.filter(x=>x.n!==n); this.retxQ=this.retxQ.filter(x=>x.n!==n); n.sl=null; }
  enqueue(n,pkt){ const s=n.sl; if(!s)return;
    if(pkt.kind==="CAM"||pkt.kind==="SPAT"||pkt.kind==="PSM")
      for(let i=s.q.length-1;i>=0;i--)if(s.q[i].kind===pkt.kind)s.q.splice(i,1);
    if(s.q.length>=8){ this.w.metrics.cnt.drop++; if(pkt.prio===1)s.q.pop(); else return; }
    if(pkt.prio===1)s.q.unshift(pkt); else s.q.push(pkt); }
  overlap(a,b){ return a<b+this.prof.chPerPkt && b<a+this.prof.chPerPkt; }
  subNoise(){ return this.noiseFloor+10*Math.log10(this.prof.chPerPkt/this.nSub); }
  reselCount(){ const c=C[this.name]; return c.cReselMin+((this.w.rand()*(c.cReselMax-c.cReselMin+1))|0); }
  /* --- sensing-based candidate selection (TS 36.213 §14.1.1.6, simplified) --- */
  select(n){ const P=this.prof, s=n.sl, now=this.w.t, total=this.rriSlots*this.nOpt;
    let thr=P.rsrpExcl, cand=[];
    while(thr<-40){ cand=[];
      for(let ph=0;ph<this.rriSlots;ph++)for(let sc=0;sc<this.nOpt;sc++){
        let blocked=false, energy=this.noiseFloor;
        for(const rv of s.known.values()){ if(now-rv.t>P.senseMs/1000)continue;
          if(rv.m===ph && this.overlap(sc,rv.sub)){ energy=Math.max(energy,rv.rsrp);
            if(rv.rsrp>thr)blocked=true; } }
        if(!blocked)cand.push({ph,sc,energy}); }
      if(cand.length>=total*0.2)break; thr+=3; }
    if(!cand.length)return {sl:-1,m:(this.w.rand()*this.rriSlots)|0,sub:(this.w.rand()*this.nOpt)|0,c:this.reselCount()};
    cand.sort((a,b)=>a.energy-b.energy);
    const top=cand.slice(0,Math.max(1,Math.floor(cand.length*P.bestFrac)));
    const pk=top[(this.w.rand()*top.length)|0];
    return {sl:-1,m:pk.ph,sub:pk.sc,c:this.reselCount()}; }
  /* --- resolve the slot that just ended --- */
  resolve(t){ if(!this.pending.length)return;
    const P=this.prof, chan=this.w.chan, M=this.w.metrics;
    const txSet=new Set(this.pending.map(x=>x.n));
    for(const tx of this.pending){ for(const rx of this.nodes){ if(rx===tx.n)continue;
      if(txSet.has(rx)){ M.cnt.rxHd++; continue; }
      const rss=chan.rxDbm(tx.n,rx); if(rss<P.sensDbm){ M.cnt.rxRange++; continue; }
      let nMw=dbm2mw(this.subNoise()); if(this.w.bgBusyNow)nMw+=dbm2mw(-84);
      for(const o of this.pending){ if(o!==tx && this.overlap(tx.sub,o.sub))nMw+=dbm2mw(chan.rxDbm(o.n,rx)); }
      let sinr=rss-mw2dbm(nMw); if(tx.attempt>1)sinr+=P.harqGain;
      const ps=1/(1+Math.exp(-(sinr-P.sinrMid)/P.sinrSlope));
      if(this.w.rand()<ps){ this.w.comm.deliver(tx.pkt,tx.n,rx,t,'PC5');
        rx.lastRssi=rss; rx.lastSinr=sinr;
        rx.sl.known.set(tx.n.id,{m:tx.m,sub:tx.sub,rsrp:rss,t}); }
      else M.cnt.rxSinr++;
    } }
    this.pending=[]; }
  /* --- schedule transmissions for the new slot --- */
  schedule(t){ const P=this.prof; let busySub=0;
    const due=this.retxQ.filter(r=>r.slot<=this.slotNo);
    this.retxQ=this.retxQ.filter(r=>r.slot>this.slotNo);
    for(const r of due){ if(r.n.sl){ this.pending.push({n:r.n,pkt:r.pkt,sub:r.sub,m:r.m,attempt:(r.attempt||1)+1});
      this.w.metrics.cnt.retx++; busySub+=P.chPerPkt; } }
    for(const n of this.nodes){ const s=n.sl; if(!s||!s.q.length)continue;
      if(this.w.p.dcc && this.occ>0.65 && s.q[0].prio>1)continue;
      let go=false, sub=0, m=0;
      if(this.dyn){ if(!s.grant){ s.grant=this.select(n); s.grant.sl=this.slotNo; }
        go=true; sub=s.grant.sub; m=s.grant.m; s.grant=null; }
      else{ if(!s.grant)s.grant=this.select(n);
        if(this.slotNo%this.rriSlots===s.grant.m){ go=true; sub=s.grant.sub; m=s.grant.m;
          if(--s.grant.c<=0){ s.grant = this.w.rand()<this.w.p.probKeep ? {sl:-1,m,sub,c:this.reselCount()} : null; } } }
      if(go){ const pkt=s.q.shift();
        this.w.comm.trackFirst(pkt,n);
        this.pending.push({n,pkt,sub,m,attempt:1}); this.w.metrics.cnt.tx++; busySub+=P.chPerPkt;
        if(this.w.fx)this.w.fx.ripple(n.x,n.y,pkt.kind);
        const k=Math.min(this.w.p.blindRetx, this.name==="NR"?P.blindRetx:1);
        for(let r=0;r<k;r++){ const gap=1+((this.w.rand()*4)|0);
          this.retxQ.push({n,pkt,sub:(this.w.rand()*this.nOpt)|0,m,slot:this.slotNo+gap,attempt:1}); }
        if(this.name==="NR" && pkt.prio===1){ for(let f=1;f<P.fbRetxMax;f++)
          this.retxQ.push({n,pkt,sub:(this.w.rand()*this.nOpt)|0,m,slot:this.slotNo+2*f,attempt:1}); }
      } }
    this.occ += (busySub/this.nSub - this.occ)*0.1;
  }
  tick(t){ if(++this.tk<this.slotTicks)return; this.tk=0;
    this.resolve(t); this.slotNo++; this.schedule(t); }
  avgCbr(){ return this.occ; }
}

/* =====================================================================================
   SECTION 10 - net/uu + comm/ : V2N over Uu (LTE/NR uplink + MEC-edge|cloud + downlink,
   handover interruption) and the central message bus. Comm owns node comm-IDs, the
   per-mode radio stacks, neighbor tables, and the trackPkt/onDecode metrics hooks.
   ===================================================================================== */
class UuNet{
  constructor(w){ this.w=w; this.q=[]; this.nr=(w.p.mode==="NR-V2X"||w.p.mode==="HYBRID"); }
  attach(n){} detach(n){ this.q=this.q.filter(x=>x.src!==n); }
  send(src,pkt,t){ const w=this.w, bs=NET.bsSites.slice(0,w.p.bsN);
    let bi=0,bd=Infinity; for(let i=0;i<bs.length;i++){ const d=hyp(src.x-bs[i][0],src.y-bs[i][1]);
      if(d<bd){bd=d;bi=i;} }
    if(src.bsi!==bi){ src.bsi=bi; src.hoUntil=t+(this.nr?C.UU.hoNr:C.UU.hoLte)/1000; }
    w.metrics.cnt.uuTx++;
    if(t<src.hoUntil){ w.metrics.cnt.uuLoss++; return; }
    if(w.rand()<C.UU.perLegLoss*2){ w.metrics.cnt.uuLoss++; return; }
    const ul=this.nr?C.UU.nrUl:C.UU.lteUl, dl=this.nr?C.UU.nrDl:C.UU.lteDl, core=w.p.edge?C.UU.edge:C.UU.cloud;
    const S=g=>clamp(w.gauss(g.mu,g.sd),g.min,g.max);
    this.q.push({src,pkt,x:src.x,y:src.y,due:t+(S(ul)+S(core)+S(dl))/1000}); }
  tick(t){ const w=this.w;
    for(let i=this.q.length-1;i>=0;i--){ const m=this.q[i]; if(t<m.due)continue;
      this.q.splice(i,1);
      for(const n of w.comm.nodes){ if(n.kind!=="veh"||n===m.src)continue;
        if(hyp(n.x-m.x,n.y-m.y)<=w.p.awareM)w.comm.deliver(m.pkt,m.src,n,t,'UU'); }
      w.metrics.cnt.uuOk++; } }
}
let __PID=1;
class Comm{
  constructor(w){ this.w=w; this.nodes=[]; this.freeIds=[]; for(let i=191;i>=0;i--)this.freeIds.push(i);
    const mode=w.p.mode;
    this.dsrc = mode==="DSRC" ? new DsrcMac(w) : null;
    this.lte  = mode==="LTE-V2X" ? new SidelinkPool(w,C.LTE,"LTE") : null;
    this.nr   = (mode==="NR-V2X"||mode==="HYBRID") ? new SidelinkPool(w,C.NR,"NR") : null;
    this.uu   = (mode==="HYBRID"||w.p.netAssist) ? new UuNet(w) : null;
    this.stacks=[]; if(this.dsrc)this.stacks.push(this.dsrc);
      if(this.lte)this.stacks.push(this.lte); if(this.nr)this.stacks.push(this.nr); }
  attach(n){ n.ci=this.freeIds.length?this.freeIds.pop():-1;
    n.txBusyUntil=-1; n.lastRssi=NaN; n.lastSinr=NaN; n.cTx=0; n.cRx=0;
    n.bsi=-1; n.hoUntil=-1; n.nbrs=new Map();
    this.nodes.push(n); for(const s of this.stacks)s.attach(n); if(this.uu)this.uu.attach(n); }
  detach(n){ const i=this.nodes.indexOf(n); if(i>=0)this.nodes.splice(i,1);
    for(const s of this.stacks)s.detach(n); if(this.uu)this.uu.detach(n);
    if(n.ci>=0)this.freeIds.push(n.ci); n.ci=-1; }
  newMsg(src,kind,bytes,prio,data,deadline){
    return {pid:__PID++,src:src.id,kind,bytes,prio,tGen:this.w.t,data,deadline}; }
  targetsFor(src,awareM){ const out=[];
    for(const n of this.nodes){ if(n===src||n.kind!=="veh")continue;
      const d=hyp(n.x-src.x,n.y-src.y); if(d<=awareM)out.push({id:n.id,d,x:n.x,y:n.y}); }
    return out; }
  send(src,kind,bytes,prio,data,deadline){
    const pkt=this.newMsg(src,kind,bytes,prio,data,deadline); pkt._tracked=false; src.cTx++;
    for(const s of this.stacks)s.enqueue(src,pkt);
    if(this.uu)this.uu.send(src,pkt,this.w.t);
    return pkt; }
  trackFirst(pkt,txNode){ if(pkt._tracked)return; pkt._tracked=true;
    this.w.metrics.trackPkt(pkt,this.targetsFor(txNode,this.w.p.awareM)); }
  deliver(pkt,txN,rx,t,tech){ rx.cRx++; this.w.metrics.onDecode(pkt,rx.id,tech);
    if((pkt.kind==="CAM"||pkt.kind==="PSM")&&pkt.data)rx.nbrs.set(pkt.src,{t,kind:pkt.kind,...pkt.data});
    if(this.w.app)this.w.app.onMsg(rx,pkt,txN);
    if(this.w.fx&&(rx===this.w.selected||txN===this.w.selected))this.w.fx.link(txN,rx,tech); }
  tickFast(t){ for(const s of this.stacks)s.tick(t); }
  tickMs(t){ if(this.uu)this.uu.tick(t); }
  avgCbr(){ if(this.dsrc)return this.dsrc.avgCbr(); if(this.nr)return this.nr.avgCbr();
    if(this.lte)return this.lte.avgCbr(); return 0; }
  nodeCbr(n){ if(n.dsrc)return n.dsrc.cbr; return this.avgCbr(); }
}

/* =====================================================================================
   SECTION 11 - app/safety : SAE J2735 message set (CAM/BSM, DENM, SPaT, PSM) and the
   cooperative safety logic - Intersection Collision Warning, EEBL, VRU, Emergency-
   Vehicle Alert. Conflict detection uses neighbor-table extrapolation to the geometric
   conflict point (surrogate PET). Oracle provides ground truth for miss/false-alarm
   scoring; Script drives the scenario events. (README §5, §7.)
   ===================================================================================== */
class SafetyApp{
  constructor(w){ this.w=w; }
  rate(v){ const w=this.w;
    if(w.comm.dsrc)return w.comm.dsrc.rateFor(v);
    let r=w.p.beaconHz; if(w.p.dcc){ const occ=w.comm.avgCbr();
      if(occ>0.6)r=Math.min(r,5); if(occ>0.8)r=Math.min(r,2); } return r; }
  genBeacons(t){ const w=this.w;
    for(const v of w.vehicles){ if(v.crashed)continue;
      const iv=1/Math.max(1,this.rate(v));
      if(t-v.lastGen>=iv-1e-6){ v.lastGen=t;
        w.comm.send(v,"CAM",w.p.pktBytes,3,{rid:v.route.id,s:v.s,v:v.v,a:v.a,x:v.x,y:v.y}); }
      if(v.a<-3 && v.v>4 && t-v.eeblT>2){ v.eeblT=t;
        w.comm.send(v,"DENM",C.APP.denmBytes,1,{event:"ebrake",x:v.x,y:v.y,dir:v.route.dir},t+0.3); } }
    if(w.rsuActive && w.p.rsuOn)for(const rsu of w.rsus){
      if(t-rsu.lastGen>=0.1-1e-6){ rsu.lastGen=t; const cd=w.signals.countdown();
        w.comm.send(rsu,"SPAT",C.APP.spatBytes,3,{phase:cd.grp,st:cd.st,rem:cd.rem}); } }
    for(const p of w.peds){ if(!p.connected)continue;
      if(t-p.lastGen>=1-1e-6){ p.lastGen=t;
        w.comm.send(p,"PSM",C.APP.psmBytes,2,{cw:p.cw.id,prog:p.prog,dir:p.dir,vp:p.v,x:p.x,y:p.y}); } }
  }
  tick(t){ const w=this.w;
    if(w.rsuActive && w.p.rsuOn)for(const rsu of w.rsus)this.rsuRelay(rsu,t);
    for(const v of w.vehicles){ if(!v.crashed)this.evalVeh(v,t); }
  }
  evalVeh(v,t){ const w=this.w;
    for(const [id,e] of v.nbrs){ if(t-e.t>1.5)v.nbrs.delete(id); }
    for(const [id,e] of v.nbrs){ if(e.kind!=="CAM"||e.rid===undefined)continue;
      const cp=NET.conflictOf(v.route.id,e.rid); if(!cp)continue;
      const dt=t-e.t, sOther=e.s+e.v*dt;
      const dMe=cp.sA-v.s, dO=cp.sB-sOther;
      if(dMe<0||dMe>130||dO<-3||dO>130)continue;
      const ta=dMe/Math.max(v.v,0.3), tb=dO/Math.max(e.v,0.3);
      if(ta<C.APP.ttcWarn && Math.abs(ta-tb)<C.APP.conflictGap)
        this.applyHazard(v,id,e,ta,ta<C.APP.ttcBrake,t); }
  }
  applyHazard(v,nbrId,e,ttc,level2,t){ const w=this.w;
    v.risk=Math.max(v.risk,level2?2:1); v.riskT=t;
    if(level2 && !v.isViol && (!v.brakeCmd))
      v.brakeCmd={at:t+C.APP.reaction*(0.6+0.4*w.rand()),until:t+2.0,dec:C.APP.coopDecel};
    if(t-v.fcwT>2.5){ v.fcwT=t;
      w.comm.send(v,"ICW",C.APP.awareness,1,{a:v.id,b:nbrId,tc:ttc},t+Math.max(0.2,C.APP.ttcBrake-C.APP.reaction-0.3)); }
    if(level2){ const key=Math.min(v.id,nbrId)+"_"+Math.max(v.id,nbrId);
      if(!w.oracle.isDanger(v.id,nbrId))w.metrics.noteFalse(key); }
  }
  rsuRelay(rsu,t){ const w=this.w; if(!rsu.relayCd)rsu.relayCd=new Map();
    const ents=[]; for(const [id,e] of rsu.nbrs){ if(e.kind==="CAM"&&t-e.t<0.6&&e.rid!==undefined)ents.push([id,e]); }
    for(let i=0;i<ents.length;i++)for(let j=i+1;j<ents.length;j++){
      const [ia,ea]=ents[i],[ib,eb]=ents[j];
      const cp=NET.conflictOf(ea.rid,eb.rid); if(!cp)continue;
      const da=cp.sA-ea.s, db=cp.sB-eb.s; if(da<0||da>120||db<0||db>120)continue;
      const ta=da/Math.max(ea.v,0.3), tb=db/Math.max(eb.v,0.3);
      if(ta<C.APP.ttcWarn && Math.abs(ta-tb)<C.APP.conflictGap){
        const key=Math.min(ia,ib)+"_"+Math.max(ia,ib);
        if(t-(rsu.relayCd.get(key)||-9)>2){ rsu.relayCd.set(key,t);
          w.comm.send(rsu,"ICW",C.APP.awareness,1,{a:ia,b:ib,tc:ta},t+Math.max(0.2,ta-C.APP.reaction)); } }
    }
  }
  onMsg(rx,pkt,txN){ const w=this.w,t=w.t; if(rx.kind!=="veh")return; const d=pkt.data; if(!d)return;
    if(pkt.kind==="DENM"){ if(hyp(d.x-rx.x,d.y-rx.y)<160){ rx.cautionT=t;
        if(d.event==="siren"&&hyp(d.x-rx.x,d.y-rx.y)<90)rx.evCareT=t; } }
    else if(pkt.kind==="ICW"){ if(d.a===rx.id||d.b===rx.id){ rx.risk=Math.max(rx.risk,2); rx.riskT=t;
        if(!rx.isViol&&!rx.brakeCmd)rx.brakeCmd={at:t+C.APP.reaction*(0.6+0.4*w.rand()),until:t+2.0,dec:C.APP.coopDecel}; } }
    else if(pkt.kind==="PSM"){ for(const c of rx.route.cw){ if(c.cw.id===d.cw){
        const ds=c.s-rx.s; if(ds>-2&&ds<50)rx.pedAlertT=t; } } }
  }
}
class Oracle{
  constructor(w){ this.w=w; this.rec=new Map(); this.dangers=new Set(); }
  isDanger(a,b){ return this.dangers.has(Math.min(a,b)+"_"+Math.max(a,b)); }
  willStop(v,dcp){ if(v.crashed)return true;
    if(v.a<-0.5){ const sd=v.v*v.v/(2*Math.abs(v.a)); return sd<dcp-1; }
    return false; }
  tick(t){ const w=this.w, V=w.vehicles, live=new Set();
    for(let i=0;i<V.length;i++)for(let j=i+1;j<V.length;j++){ const a=V[i],b=V[j];
      if(a.crashed||b.crashed||a.route.dir===b.route.dir)continue;
      const cp=NET.conflictOf(a.route.id,b.route.id); if(!cp)continue;
      const da=cp.sA-a.s, db=cp.sB-b.s; if(da<-3||da>130||db<-3||db>130)continue;
      const ta=da/Math.max(a.v,0.3), tb=db/Math.max(b.v,0.3);
      if(!(ta<C.APP.ttcWarn && Math.abs(ta-tb)<1.8))continue;
      if(this.willStop(a,da)||this.willStop(b,db))continue;
      const key=Math.min(a.id,b.id)+"_"+Math.max(a.id,b.id); live.add(key);
      let r=this.rec.get(key);
      if(!r){ r={t0:t,warned:false,missed:false,tc:Math.min(ta,tb)}; this.rec.set(key,r);
        w.metrics.safety.confl++; if(w.log)w.log("warn","Conflict "+a.id+"×"+b.id+" · TTC "+Math.min(ta,tb).toFixed(1)+"s"); }
      r.tc=Math.min(ta,tb); if(a.risk>0||b.risk>0)r.warned=true;
      if(!r.warned && r.tc<C.APP.reaction+0.3 && !r.missed){ r.missed=true; w.metrics.safety.miss++; }
      w.metrics.safety.minTTC=Math.min(w.metrics.safety.minTTC,ta,tb);
    }
    this.dangers=live;
    for(const [key,r] of [...this.rec]){ if(live.has(key))continue;
      const [ai,bi]=key.split("_").map(Number);
      const a=V.find(v=>v.id===ai), b=V.find(v=>v.id===bi);
      const crashed=(a&&a.crashed)||(b&&b.crashed);
      if(!crashed){ w.metrics.safety.avoided++; if(r.warned)w.metrics.safety.warned++; else w.metrics.safety.lucky++; }
      this.rec.delete(key); }
  }
}
class Script{
  constructor(w,flag){ this.w=w; this.flag=flag; this.done={}; this.brakeT=0; }
  tick(t){ const w=this.w, f=this.flag; if(!f)return;
    if(f==="accident" && t>8 && !this.done.acc){ this.done.acc=true;
      const c=w.vehicles.find(v=>v.s>60&&v.s<200&&!v.crashed);
      if(c){ c.crashed=true; c.persist=true; c.v=0;
        if(w.log)w.log("bad","Vehicle "+c.id+" stalled - accident ahead");
        w.comm.send(c,"DENM",C.APP.denmBytes,1,{event:"stall",x:c.x,y:c.y,dir:c.route.dir},t+0.3); } }
    if(f==="brakes" && t>this.brakeT){ this.brakeT=t+10+w.rand()*8;
      const c=w.vehicles[(w.rand()*w.vehicles.length)|0]; if(c&&!c.crashed)c.scriptBrakeUntil=t+1.8; }
    if(f==="sigfail" && t>5 && !w.signals.dark){ w.signals.dark=true;
      if(w.log)w.log("warn","Signal failure - all-way stop control"); }
    if(f==="rsufail" && t>10 && w.rsuActive){ w.rsuActive=false; if(w.log)w.log("warn","RSU offline"); }
    if(f==="ev"){
      if(t>6 && !this.done.ev){ this.done.ev=true;
        const dir=["N","S","E","W"][(w.rand()*4)|0]; const v=w.traffic.spawn(dir,"T",{ev:true});
        if(v){ w.evVeh=v; if(w.log)w.log("warn","Emergency vehicle dispatched "+dir); } }
      const ev=w.evVeh;
      if(ev && w.vehicles.includes(ev)){ const r=ev.route, d=r.sStop-ev.s;
        if(d<140 && d>0 && w.signals.force!==r.group){ w.signals.preempt(r.group); w.metrics.safety.evPre++; }
        if(ev.s>r.sBoxOut+8)w.signals.release();
        if(t-ev.lastEva>0.5){ ev.lastEva=t;
          w.comm.send(ev,"DENM",C.APP.denmBytes,1,{event:"siren",x:ev.x,y:ev.y,dir:r.dir},t+0.3); } }
      else if(this.done.ev && w.evVeh){ w.signals.release(); w.evVeh=null; }
    }
  }
}

/* =====================================================================================
   SECTION 12 - sim/world : the quasi-discrete-event engine. Channel ticks at 100 us;
   mobility at 20 ms; application/safety/oracle at 10 Hz; metrics sampled at 2 Hz.
   Owns spawning, collisions, snapshots (for replay) and the event log. runHeadless()
   drives the same code path with no renderer for validation and density sweeps.
   ===================================================================================== */
function nowMs(){ return (typeof performance!=="undefined"&&performance.now)?performance.now():Date.now(); }
class FX{ constructor(){ this.rip=[]; this.lnk=[]; this.fla=[]; }
  ripple(x,y,kind){ if(this.rip.length<500)this.rip.push({x,y,kind,t0:nowMs()}); }
  link(a,b,tech){ if(a&&b&&this.lnk.length<300)this.lnk.push({ax:a.x,ay:a.y,bx:b.x,by:b.y,tech,t0:nowMs()}); }
  flash(x,y,col){ if(this.fla.length<200)this.fla.push({x,y,col,t0:nowMs()}); } }

class World{
  constructor(p,seed,fx){ this.p={...p}; this.rand=RNG((seed>>>0)||1); this.gauss=gaussFactory(this.rand);
    this.t=0; this.tick=0; this.events=[]; this.onLog=null; this.selected=null;
    this.vehicles=[]; this.peds=[]; this.evVeh=null; this.rsuActive=!!p.rsuOn;
    this.bgBusyNow=false; this.snaps=[]; this.snapOn=false; this.lastGrant=-9; this.spawnBias=null;
    const wf=p.weather==="rain"?0.85:(p.weather==="fog"?0.72:(p.weather==="night"?0.92:1));
    this.vmax=p.vmaxKmh/3.6*wf;
    this.fx=fx?new FX():null;
    this.metrics=new Metrics(this);
    this.chan=new Channel(this);
    this.comm=new Comm(this);
    this.signals=new Signals(p.cycleS);
    this.intxDirs = p.intx==="tee" ? ["W","S","E"] : ["N","S","E","W"];
    this.signals.dark = (p.intx==="awstop");   // all-way-stop = permanently unsignalized
    this.traffic=new Traffic(this);
    this.app=new SafetyApp(this);
    this.oracle=new Oracle(this);
    this.script=new Script(this,p._flag);
    this.rsus=[]; const rn=Math.min(this.p.rsuN,NET.rsuSites.length);
    for(let i=0;i<rn;i++){ const s=NET.rsuSites[i];
      const rsu={id:9000+i,kind:"rsu",x:s[0],y:s[1],lastGen:-this.rand()*0.1,relayCd:new Map()};
      this.rsus.push(rsu); this.comm.attach(rsu); }
    this.heatOk=new Float32Array(28*28); this.heatBad=new Float32Array(28*28);
    this.prefill();
  }
  heatAt(x,y,ok){ const gx=Math.floor((x+280)/20), gy=Math.floor((y+280)/20);
    if(gx<0||gy<0||gx>=28||gy>=28)return; const i=gy*28+gx; if(ok)this.heatOk[i]++; else this.heatBad[i]++; }
  kpiLite(){ let e=0,d=0; for(const w of this.metrics.win){e+=w.exp;d+=w.del;}
    return {pdr:e?d/e:NaN,cbr:this.comm.avgCbr()}; }
  pickTypePrefill(){ const r=this.rand(); let a=0;
    for(const t of ["car","suv","van","truck","bus"]){a+=C.VTYPES[t].share; if(r<a)return t;} return "car"; }
  prefill(){ const target=Math.round(0.6*this.p.nVeh); let tries=0;
    while(this.vehicles.length<target && tries<target*8+40){ tries++;
      const dir=this.intxDirs[(this.rand()*this.intxDirs.length)|0];
      const tp=this.p.turnPct/100, r=this.rand(), mv=r<tp/2?"L":(r<tp?"R":"T");
      const lane=mv==="L"?0:(mv==="R"?2:(this.rand()<0.5?1:2));
      const route=NET.byId[`${dir}-${mv}${lane}`];
      if(!route)continue;
      if(this.p.intx==="tee" && route.exitDir==="N")continue;
      const s=10+this.rand()*210;
      let ok=true; for(const v of this.vehicles){ if(v.route===route&&Math.abs(v.s-s)<14){ok=false;break;} }
      if(!ok)continue;
      const v=new Vehicle(this,route,this.pickTypePrefill(),{}); v.s=s; v.updPos();
      this.vehicles.push(v); this.comm.attach(v); }
  }
  crash(a,b){ if(a.crashed&&b.crashed)return;
    a.crashed=true; b.crashed=true; a.v=0; b.v=0;
    if(!a.crashT)a.crashT=this.t; if(!b.crashT)b.crashT=this.t;
    this.metrics.safety.crashes++;
    if(this.fx)this.fx.flash((a.x+b.x)/2,(a.y+b.y)/2,"#dc2626");
    if(this.log)this.log("bad","COLLISION "+a.id+" × "+b.id);
    this.comm.send(a,"DENM",C.APP.denmBytes,1,{event:"crash",x:a.x,y:a.y,dir:a.route.dir},this.t+0.3); }
  pedHit(v,p){ if(p.done)return; p.done=true; this.metrics.safety.pedHit++;
    if(this.fx)this.fx.flash(p.x,p.y,"#b91c1c");
    if(this.log)this.log("bad","VRU struck by vehicle "+v.id); }
  autoClearCrashed(){ for(let i=this.vehicles.length-1;i>=0;i--){ const v=this.vehicles[i];
    if(v.crashed&&!v.persist&&this.t-v.crashT>30){ this.comm.detach(v); this.vehicles.splice(i,1); } } }
  pushSnap(){ const TK=World.TKEYS;
    const veh=this.vehicles.map(v=>[v.id,TK.indexOf(v.type),+v.x.toFixed(1),+v.y.toFixed(1),
      +v.hd.toFixed(2),+v.v.toFixed(1),v.risk,(v.isViol?1:0)|((v.isEV?1:0)<<1)|((v.crashed?1:0)<<2),+(v.laneOff||0).toFixed(1)]);
    const ped=this.peds.map(p=>[+p.x.toFixed(1),+p.y.toFixed(1)]);
    const sig={dark:this.signals.dark};
    for(const g of ["NS_L","NS_T","EW_L","EW_T"])sig[g]=this.signals.stateOf(g);
    this.snaps.push({t:this.t,veh,ped,sig,kpi:this.kpiLite()});
    if(this.snaps.length>3000)this.snaps.shift(); }
  log(cls,txt){ const e={t:this.t,cls,txt}; this.events.push(e);
    if(this.events.length>200)this.events.shift(); if(this.onLog)this.onLog(e); }
  step(dtSim){ const n=Math.min(Math.round(dtSim/C.TICK),40000);
    for(let k=0;k<n;k++){ this.tick++; const T=this.tick;
      if(T%10===0){ this.bgBusyNow=this.rand()<this.p.bgLoad; this.comm.tickMs(this.t); this.app.genBeacons(this.t); }
      this.comm.tickFast(this.t);
      if(T%200===0){ this.signals.tick(C.MOB_DT); this.script.tick(this.t);
        this.traffic.spawnTick(C.MOB_DT); this.traffic.step(this.t,C.MOB_DT); }
      if(T%1000===0){ this.chan.refresh(); this.app.tick(this.t); this.oracle.tick(this.t);
        this.metrics.gc(this.t); this.autoClearCrashed(); if(this.snapOn)this.pushSnap(); }
      if(T%5000===0)this.metrics.sample(this.t);
      this.t+=C.TICK; }
  }
}
World.TKEYS=["car","suv","van","truck","bus","ev"];

function runHeadless(pOver,seconds,seed){
  const p={...DEFAULTS,...pOver,fx:0};
  const w=new World(p,seed==null?p.seed:seed,false);
  const warm=Math.min(4,Math.max(1,seconds*0.25));
  w.step(warm); w.metrics.resetCounters();
  let left=seconds-warm; while(left>0){ const c=Math.min(1,left); w.step(c); left-=c; }
  return {w,sum:w.metrics.snapshot()};
}

/* =====================================================================================
   SECTION 13 - ui/renderer : 2-D canvas viewport (SUMO/engineering style). Pan/zoom,
   vehicle inspector picking, roads/lanes/crosswalks/buildings, signal heads, RSU/BS,
   packet-loss heat map, trajectory trails, and the packet-animation FX layer. Renders
   either a live World or a replay snapshot through a shared static-scene pass.
   ===================================================================================== */
class Renderer{
  constructor(cv){ this.cv=cv; this.ctx=cv.getContext("2d");
    this.view={ox:0,oy:0,sc:1.6}; this.drag=null; this.selected=null; this.onPick=null;
    this.resize(); this.fit();
    cv.addEventListener("mousedown",e=>{ const r=cv.getBoundingClientRect();
      this.drag={x:e.clientX,y:e.clientY,ox:this.view.ox,oy:this.view.oy,mx:e.clientX-r.left,my:e.clientY-r.top,moved:false}; });
    window.addEventListener("mousemove",e=>{ if(!this.drag)return;
      const dx=e.clientX-this.drag.x, dy=e.clientY-this.drag.y;
      if(Math.abs(dx)+Math.abs(dy)>3)this.drag.moved=true;
      this.view.ox=this.drag.ox+dx; this.view.oy=this.drag.oy+dy; });
    window.addEventListener("mouseup",e=>{ if(this.drag&&!this.drag.moved&&this.onPick){
      const r=cv.getBoundingClientRect(); this.onPick(this.pick(e.clientX-r.left,e.clientY-r.top)); }
      this.drag=null; });
    cv.addEventListener("wheel",e=>{ e.preventDefault(); const r=cv.getBoundingClientRect();
      const mx=e.clientX-r.left,my=e.clientY-r.top, f=e.deltaY<0?1.12:1/1.12;
      const wx=(mx-this.view.ox)/this.view.sc, wy=(this.view.oy-my)/this.view.sc;
      this.view.sc=clamp(this.view.sc*f,0.4,14);
      this.view.ox=mx-wx*this.view.sc; this.view.oy=my+wy*this.view.sc; },{passive:false});
    cv.addEventListener("dblclick",()=>this.fit());
  }
  resize(){ const dpr=Math.min(2,window.devicePixelRatio||1); const r=this.cv.getBoundingClientRect();
    this.W=r.width; this.H=r.height; this.cv.width=r.width*dpr; this.cv.height=r.height*dpr;
    this.ctx.setTransform(dpr,0,0,dpr,0,0); }
  fit(){ const span=150; this.view.sc=Math.min(this.W,this.H)/(span*2);
    this.view.ox=this.W/2; this.view.oy=this.H/2; }
  zoom(f){ this.view.sc=clamp(this.view.sc*f,0.4,14); }
  w2s(x,y){ return [this.view.ox+x*this.view.sc, this.view.oy-y*this.view.sc]; }
  s2w(sx,sy){ return [(sx-this.view.ox)/this.view.sc,(this.view.oy-sy)/this.view.sc]; }
  pick(mx,my){ const [wx,wy]=this.s2w(mx,my); let best=null,bd=12/this.view.sc;
    for(const v of (this._veh||[])){ const d=hyp(v.x-wx,v.y-wy); if(d<bd){bd=d;best=v;} } return best; }
  rect(x,y,w,h,fill,stroke){ const c=this.ctx, [sx,sy]=this.w2s(x,y+h), sw=w*this.view.sc, sh=h*this.view.sc;
    if(fill){c.fillStyle=fill;c.fillRect(sx,sy,sw,sh);} if(stroke){c.strokeStyle=stroke;c.lineWidth=1;c.strokeRect(sx,sy,sw,sh);} }
  drawStatic(sig,rsuActive,intx){ const c=this.ctx, V=this.view, S=this.view.sc;
    c.fillStyle="#e9ebe7"; c.fillRect(0,0,this.W,this.H);
    // road bands
    c.fillStyle="#8d939b";
    let [ax,ay]=this.w2s(-250,NET.HALF); c.fillRect(ax,ay,500*S,2*NET.HALF*S);
    if(intx==="tee"){ let [bx,by]=this.w2s(-NET.HALF,NET.HALF); c.fillRect(bx,by,2*NET.HALF*S,(250+NET.HALF)*S); }
    else { let [bx,by]=this.w2s(-NET.HALF,250); c.fillRect(bx,by,2*NET.HALF*S,500*S); }
    // road edge lines
    c.strokeStyle="#eef0f2"; c.lineWidth=1.5;
    for(const yy of [-NET.HALF,NET.HALF]){ c.beginPath(); let [x1,y1]=this.w2s(-250,yy),[x2,y2]=this.w2s(250,yy);
      c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke(); }
    for(const xx of [-NET.HALF,NET.HALF]){ c.beginPath(); let [x1,y1]=this.w2s(xx,-250),[x2,y2]=this.w2s(xx,250);
      c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke(); }
    // lane dashes (white) + centre double-yellow
    c.setLineDash([6,7]); c.strokeStyle="#d8dbdf"; c.lineWidth=1;
    for(const off of [3.67,7.33]){ for(const s of [1,-1]){
      c.beginPath(); let a=this.w2s(-250,s*off),b=this.w2s(-NET.HALF-1,s*off); c.moveTo(a[0],a[1]);c.lineTo(b[0],b[1]);
      let d=this.w2s(NET.HALF+1,s*off),e=this.w2s(250,s*off); c.moveTo(d[0],d[1]);c.lineTo(e[0],e[1]); c.stroke();
      c.beginPath(); let a2=this.w2s(s*off,-250),b2=this.w2s(s*off,-NET.HALF-1); c.moveTo(a2[0],a2[1]);c.lineTo(b2[0],b2[1]);
      let d2=this.w2s(s*off,NET.HALF+1),e2=this.w2s(s*off,250); c.moveTo(d2[0],d2[1]);c.lineTo(e2[0],e2[1]); c.stroke(); } }
    c.setLineDash([]);
    c.strokeStyle="#e8d54a"; c.lineWidth=1.4;
    for(const d of [-0.5,0.5]){ c.beginPath(); let a=this.w2s(-250,d),b=this.w2s(-NET.HALF,d);c.moveTo(a[0],a[1]);c.lineTo(b[0],b[1]);
      let e=this.w2s(NET.HALF,d),f=this.w2s(250,d);c.moveTo(e[0],e[1]);c.lineTo(f[0],f[1]);c.stroke();
      c.beginPath(); let a2=this.w2s(d,-250),b2=this.w2s(d,-NET.HALF);c.moveTo(a2[0],a2[1]);c.lineTo(b2[0],b2[1]);
      let e2=this.w2s(d,NET.HALF),f2=this.w2s(d,250);c.moveTo(e2[0],e2[1]);c.lineTo(f2[0],f2[1]);c.stroke(); }
    // stop lines
    c.strokeStyle="#f4f6f8"; c.lineWidth=3;
    const sl=[[0,-NET.HALF-1,NET.HALF,-NET.HALF-1],[0,NET.HALF+1,-NET.HALF,NET.HALF+1],
              [-NET.HALF-1,0,-NET.HALF-1,-NET.HALF],[NET.HALF+1,0,NET.HALF+1,NET.HALF]];
    for(const seg of sl){ c.beginPath(); let a=this.w2s(seg[0],seg[1]),b=this.w2s(seg[2],seg[3]);
      c.moveTo(a[0],a[1]);c.lineTo(b[0],b[1]);c.stroke(); }
    // crosswalks (zebra)
    c.fillStyle="#f2f4f6";
    for(const cw of NET.crosswalks){ for(let i=-5;i<=5;i++){ const o=i*1.9;
      if(cw.axis==="x")this.rect(o-0.55,cw.fixed-1.6,1.1,3.2,"#f2f4f6");
      else this.rect(cw.fixed-1.6,o-0.55,3.2,1.1,"#f2f4f6"); } }
    // buildings
    for(const o of NET.deco)this.rect(o.x,o.y,o.w,o.h,"#e2e4e9","#cfd3d9");
    for(const o of NET.obstacles)this.rect(o.x,o.y,o.w,o.h,o.tall?"#d3d6dc":"#dcdee3","#b3b7be");
    // trees
    c.fillStyle="#9db99a"; for(const t of NET.trees){ const [sx,sy]=this.w2s(t[0],t[1]);
      c.beginPath();c.arc(sx,sy,Math.max(1.5,1.8*S/2),0,TAU);c.fill(); }
    // RSU masts
    for(let i=0;i<NET.rsuSites.length;i++){ const s=NET.rsuSites[i]; const [sx,sy]=this.w2s(s[0],s[1]);
      c.fillStyle=rsuActive?"#0b5cad":"#9aa0a8"; c.fillRect(sx-2,sy-2,4,4);
      if(rsuActive){ c.strokeStyle="rgba(11,92,173,0.25)";c.setLineDash([3,4]);c.beginPath();
        c.arc(sx,sy,150*S,0,TAU);c.stroke();c.setLineDash([]); } }
    // base stations
    for(const s of NET.bsSites.slice(0,2)){ const [sx,sy]=this.w2s(s[0],s[1]);
      c.fillStyle="#5b616b"; c.beginPath();c.moveTo(sx,sy-7);c.lineTo(sx-5,sy+4);c.lineTo(sx+5,sy+4);c.closePath();c.fill();
      c.fillStyle="#6f7680";c.font="9px Segoe UI";c.fillText("gNB",sx+7,sy); }
    // signal heads
    this.drawSignals(sig,intx);
  }
  drawSignals(sig,intx){ const c=this.ctx;
    // one head per approach, placed at the right-front corner of the approach
    let heads=[["N",9.25,-13,"NS"],["S",-9.25,13,"NS"],["E",13,9.25,"EW"],["W",-13,-9.25,"EW"]];
    if(intx==="tee")heads=heads.filter(h=>h[0]!=="N");
    for(const h of heads){ const [dir,x,y,ax]=h; const [sx,sy]=this.w2s(x,y);
      const gT=sig[ax+"_T"], dark=sig.dark;
      let col="#3a3f47"; if(!dark){ col= gT==="G"?"#2ec26b":gT==="Y"?"#f5c344":"#e0523e"; }
      else col=(Math.floor(Date.now()/500)%2)?"#f5c344":"#3a3f47";
      c.fillStyle="#23262b"; c.fillRect(sx-2.5,sy-6,5,12);
      for(let i=0;i<3;i++){ const on=!dark&&((i===0&&gT==="R")||(i===1&&gT==="Y")||(i===2&&gT==="G"));
        c.fillStyle=on?(i===0?"#e0523e":i===1?"#f5c344":"#2ec26b"):"#333840";
        c.beginPath();c.arc(sx,sy-3.4+i*3.4,1.4,0,TAU);c.fill(); }
    }
  }
  drawVehicle(c,v){ const [sx,sy]=this.w2s(v.x,v.y); const S=this.view.sc;
    const off=(v.laneOff||0)*S;
    c.save(); c.translate(sx-Math.sin(v.hd)*off*0,sy);
    c.translate(off*Math.cos(v.hd+Math.PI/2)*0,0);
    c.translate(0,0); c.rotate(-v.hd);
    const L=v.len*S, Wd=v.wid*S;
    let col=C.VTYPES[v.type]?C.VTYPES[v.type].color:"#4a637f";
    if(v.crashed)col="#8a8f97";
    c.fillStyle=col; c.strokeStyle="rgba(0,0,0,0.25)"; c.lineWidth=0.6;
    this.roundRect(c,-L/2,-Wd/2,L,Wd,Math.min(2,Wd*0.3)); c.fill();
    // windshield band
    c.fillStyle="rgba(255,255,255,0.35)"; c.fillRect(L*0.12,-Wd/2+0.6,Math.max(1,L*0.16),Wd-1.2);
    if(v.type==="ev"){ const on=Math.floor(Date.now()/150)%2; c.fillStyle=on?"#e33":"#37f";
      c.fillRect(-L*0.1,-Wd/2,L*0.2,1.4); c.fillStyle=on?"#37f":"#e33"; c.fillRect(-L*0.1,Wd/2-1.4,L*0.2,1.4); }
    if(v.crashed){ c.strokeStyle="#c0392b";c.lineWidth=1.4;c.beginPath();
      c.moveTo(-L/3,-Wd/3);c.lineTo(L/3,Wd/3);c.moveTo(L/3,-Wd/3);c.lineTo(-L/3,Wd/3);c.stroke(); }
    if(v.risk>0){ c.strokeStyle=v.risk>=2?"#dc2626":"#f59e0b"; c.lineWidth=1.6;
      this.roundRect(c,-L/2-1.5,-Wd/2-1.5,L+3,Wd+3,3); c.stroke(); }
    c.restore();
    if(v.isViol){ c.fillStyle="#dc2626"; c.font="bold 10px Segoe UI"; c.fillText("!",sx+6,sy-6); }
  }
  roundRect(c,x,y,w,h,r){ c.beginPath(); c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r);
    c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }
  drawHeat(w){ const c=this.ctx;
    for(let gy=0;gy<28;gy++)for(let gx=0;gx<28;gx++){ const i=gy*28+gx;
      const bad=w.heatBad[i],ok=w.heatOk[i]; if(bad+ok<1)continue;
      const a=bad/(bad+ok+3)*0.55; if(a<0.03)continue;
      c.fillStyle="rgba(220,40,40,"+a.toFixed(3)+")";
      this.rect(gx*20-280,gy*20-280,20,20,c.fillStyle); } }
  drawFX(fx){ if(!fx)return; const c=this.ctx, now=nowMs(), S=this.view.sc;
    fx.rip=fx.rip.filter(r=>now-r.t0<900);
    for(const r of fx.rip){ const age=(now-r.t0)/900, rad=age*60*S;
      c.strokeStyle=this.kindColor(r.kind,1-age); c.lineWidth=1.2;
      const [sx,sy]=this.w2s(r.x,r.y); c.beginPath();c.arc(sx,sy,rad,0,TAU);c.stroke(); }
    fx.lnk=fx.lnk.filter(l=>now-l.t0<260);
    for(const l of fx.lnk){ const age=(now-l.t0)/260; c.strokeStyle="rgba(11,92,173,"+(1-age).toFixed(2)+")";
      c.lineWidth=1.4; const a=this.w2s(l.ax,l.ay),b=this.w2s(l.bx,l.by);
      c.beginPath();c.moveTo(a[0],a[1]);c.lineTo(b[0],b[1]);c.stroke(); }
    fx.fla=fx.fla.filter(f=>now-f.t0<600);
    for(const f of fx.fla){ const age=(now-f.t0)/600; const [sx,sy]=this.w2s(f.x,f.y);
      c.fillStyle=f.col; c.globalAlpha=1-age; c.beginPath();c.arc(sx,sy,(6+age*18)*S/2,0,TAU);c.fill(); c.globalAlpha=1; } }
  kindColor(k,a){ const m={CAM:"11,92,173",DENM:"217,119,6",ICW:"220,38,38",PSM:"8,145,178",SPAT:"100,116,139"};
    return "rgba("+(m[k]||"120,120,120")+","+Math.max(0,a).toFixed(2)+")"; }
  overlays(weather){ const c=this.ctx;
    if(weather==="night"){ c.fillStyle="rgba(10,14,26,0.42)"; c.fillRect(0,0,this.W,this.H); }
    else if(weather==="fog"){ c.fillStyle="rgba(233,236,240,0.42)"; c.fillRect(0,0,this.W,this.H); }
    else if(weather==="rain"){ c.fillStyle="rgba(120,140,160,0.14)"; c.fillRect(0,0,this.W,this.H); } }
  drawMinimap(vehicles,intx){ const c=this.ctx, mw=118, mh=118, pad=10;
    const x0=this.W-mw-pad, y0=this.H-mh-pad;
    c.save(); c.fillStyle="rgba(255,255,255,0.9)"; c.strokeStyle="#aeb4bd"; c.lineWidth=1;
    c.fillRect(x0,y0,mw,mh); c.strokeRect(x0,y0,mw,mh);
    const RR=260, sc=(mw-10)/(2*RR), cx=x0+mw/2, cy=y0+mh/2;
    const m2=(wx,wy)=>[cx+wx*sc,cy-wy*sc];
    // clip everything after this to the map interior so the viewport box never spills outside
    c.beginPath(); c.rect(x0+1,y0+1,mw-2,mh-2); c.clip();
    c.strokeStyle="#c3c7cd"; c.lineWidth=Math.max(2,2*NET.HALF*sc);
    const northTop = intx==="tee" ? 0 : RR;
    let a=m2(-RR,0),b=m2(RR,0),d=m2(0,-RR),e=m2(0,northTop);
    c.beginPath();c.moveTo(a[0],a[1]);c.lineTo(b[0],b[1]);c.moveTo(d[0],d[1]);c.lineTo(e[0],e[1]);c.stroke();
    c.fillStyle="#0b5cad"; for(const v of vehicles){ const [sx,sy]=m2(clamp(v.x,-RR,RR),clamp(v.y,-RR,RR)); c.fillRect(sx-0.8,sy-0.8,1.6,1.6); }
    const tl=this.s2w(0,0), br=this.s2w(this.W,this.H); const p1=m2(tl[0],tl[1]),p2=m2(br[0],br[1]);
    c.strokeStyle="#dc2626"; c.lineWidth=1;
    c.strokeRect(Math.min(p1[0],p2[0]),Math.min(p1[1],p2[1]),Math.abs(p2[0]-p1[0]),Math.abs(p2[1]-p1[1]));
    c.restore();
    c.save(); c.fillStyle="#5b616b"; c.font="9px Segoe UI"; c.fillText("overview",x0+6,y0+12); c.restore(); }
  scaleBar(){ const c=this.ctx, S=this.view.sc, px=50*S;
    c.strokeStyle="#5b616b";c.lineWidth=1.5;c.beginPath();c.moveTo(14,this.H-16);c.lineTo(14+px,this.H-16);
    c.moveTo(14,this.H-19);c.lineTo(14,this.H-13);c.moveTo(14+px,this.H-19);c.lineTo(14+px,this.H-13);c.stroke();
    c.fillStyle="#4a4f57";c.font="10px Segoe UI";c.fillText("50 m",14+px/2-12,this.H-20);
    c.fillText("N",this.W-20,20); c.beginPath();c.moveTo(this.W-16,26);c.lineTo(this.W-16,10);c.lineTo(this.W-19,15);
    c.moveTo(this.W-16,10);c.lineTo(this.W-13,15);c.stroke(); }
  draw(w){ this.resize(); const p=w.p; this._veh=w.vehicles;
    const sig={dark:w.signals.dark}; for(const g of ["NS_L","NS_T","EW_L","EW_T"])sig[g]=w.signals.stateOf(g);
    this.drawStatic(sig,w.rsuActive,w.p.intx);
    if(p.showHeat)this.drawHeat(w);
    if(p.showTrails){ const c=this.ctx; c.strokeStyle="rgba(11,92,173,0.35)";c.lineWidth=1;
      for(const v of w.vehicles){ if(v.trail.length<2)continue; c.beginPath();
        for(let i=0;i<v.trail.length;i++){ const [sx,sy]=this.w2s(v.trail[i][0],v.trail[i][1]);
          i?c.lineTo(sx,sy):c.moveTo(sx,sy);} c.stroke(); } }
    const c=this.ctx;
    for(const v of w.vehicles)this.drawVehicle(c,v);
    c.fillStyle="#2b6cb0"; for(const pd of w.peds){ const [sx,sy]=this.w2s(pd.x,pd.y);
      c.beginPath();c.arc(sx,sy,Math.max(1.6,1.1*this.view.sc),0,TAU);c.fill(); }
    if(p.showPkts)this.drawFX(w.fx);
    // selection
    if(this.selected&&w.vehicles.includes(this.selected)){ const v=this.selected;
      const [sx,sy]=this.w2s(v.x,v.y); c.strokeStyle="#0b5cad";c.lineWidth=1.6;
      c.beginPath();c.arc(sx,sy,14,0,TAU);c.stroke();
      if(p.showRange){ c.strokeStyle="rgba(11,92,173,0.25)";c.setLineDash([4,5]);
        c.beginPath();c.arc(sx,sy,p.awareM*this.view.sc,0,TAU);c.stroke();c.setLineDash([]); }
      if(p.showLinks){ c.strokeStyle="rgba(11,92,173,0.4)";c.lineWidth=0.8;
        for(const [id,e] of v.nbrs){ const nb=w.comm.nodes.find(n=>n.id===id); if(!nb)continue;
          const b=this.w2s(nb.x,nb.y); c.beginPath();c.moveTo(sx,sy);c.lineTo(b[0],b[1]);c.stroke(); } } }
    if(p.showIds){ c.fillStyle="#333";c.font="9px Consolas";
      for(const v of w.vehicles){ const [sx,sy]=this.w2s(v.x,v.y); c.fillText(v.id,sx+7,sy+3); } }
    this.overlays(p.weather); this.scaleBar(); this.drawMinimap(w.vehicles,w.p.intx);
  }
  drawSnapshot(snap,p){ this.resize(); this._veh=[];
    this.drawStatic(snap.sig,true,(p&&p.intx)||"cross");
    const c=this.ctx, TK=World.TKEYS;
    for(const a of snap.veh){ const v={x:a[2],y:a[3],hd:a[4],v:a[5],risk:a[6],
      type:TK[a[1]]||"car",len:C.VTYPES[TK[a[1]]||"car"].l,wid:C.VTYPES[TK[a[1]]||"car"].w,
      isViol:a[7]&1,isEV:(a[7]>>1)&1,crashed:(a[7]>>2)&1,laneOff:a[8]||0,id:a[0]};
      this._veh.push(v); this.drawVehicle(c,v); }
    c.fillStyle="#2b6cb0"; for(const pd of snap.ped){ const [sx,sy]=this.w2s(pd[0],pd[1]);
      c.beginPath();c.arc(sx,sy,Math.max(1.6,1.1*this.view.sc),0,TAU);c.fill(); }
    this.overlays(p?p.weather:"clear"); this.scaleBar(); this.drawMinimap(this._veh,(p&&p.intx)||"cross");
  }
}

/* =====================================================================================
   SECTION 14 - ui/chart : minimal dependency-free canvas charting for publication-style
   plots - time series, PDR/latency vs density, PDR vs distance, latency CDF, latency
   histogram, per-mode box plots, and safety bars. DPR-guarded so it is inert headless.
   ===================================================================================== */
class Chart{
  constructor(cv){ this.cv=cv; this.ctx=cv?cv.getContext("2d"):null;
    this.m={l:54,r:16,t:26,b:36}; }
  size(){ if(typeof window==="undefined"||!this.cv)return;
    const dpr=Math.min(2,window.devicePixelRatio||1), r=this.cv.getBoundingClientRect();
    this.W=r.width; this.H=r.height; this.cv.width=r.width*dpr; this.cv.height=r.height*dpr;
    this.ctx.setTransform(dpr,0,0,dpr,0,0); }
  clear(title,xl,yl){ if(!this.ctx)return; const c=this.ctx; this.size();
    c.fillStyle="#ffffff"; c.fillRect(0,0,this.W,this.H);
    c.fillStyle="#1d2733"; c.font="600 12px Segoe UI"; c.fillText(title||"",this.m.l,16);
    c.fillStyle="#5b636e"; c.font="10px Segoe UI";
    if(xl)c.fillText(xl,this.W/2-c.measureText(xl).width/2,this.H-6);
    if(yl){ c.save();c.translate(12,this.H/2);c.rotate(-Math.PI/2);c.fillText(yl,-c.measureText(yl).width/2,0);c.restore(); }
    this.title=title; }
  plotArea(){ return {x:this.m.l,y:this.m.t,w:this.W-this.m.l-this.m.r,h:this.H-this.m.t-this.m.b}; }
  nice(min,max){ if(!(max>min))max=min+1; const span=max-min, step=Math.pow(10,Math.floor(Math.log10(span/4)));
    const err=span/4/step; const s=err>=5?10*step:err>=2?5*step:err>=1?2*step:step;
    return {lo:Math.floor(min/s)*s,hi:Math.ceil(max/s)*s,step:s}; }
  setScale(xmin,xmax,ymin,ymax){ this.sx=this.nice(xmin,xmax); this.sy=this.nice(ymin,ymax);
    const a=this.plotArea(); const X=this.sx,Y=this.sy;
    this.px=v=>a.x+(v-X.lo)/(X.hi-X.lo)*a.w; this.py=v=>a.y+a.h-(v-Y.lo)/(Y.hi-Y.lo)*a.h;
    const c=this.ctx; c.strokeStyle="#e6e9ed";c.lineWidth=1;c.fillStyle="#7a828d";c.font="9px Consolas";c.textBaseline="middle";
    for(let v=X.lo;v<=X.hi+1e-9;v+=X.step){ const x=this.px(v); c.beginPath();c.moveTo(x,a.y);c.lineTo(x,a.y+a.h);c.stroke();
      const t=this.fmtTick(v); c.fillText(t,x-c.measureText(t).width/2,a.y+a.h+10); }
    for(let v=Y.lo;v<=Y.hi+1e-9;v+=Y.step){ const y=this.py(v); c.beginPath();c.moveTo(a.x,y);c.lineTo(a.x+a.w,y);c.stroke();
      const t=this.fmtTick(v); c.fillText(t,a.x-c.measureText(t).width-4,y); }
    c.strokeStyle="#aeb4bd";c.strokeRect(a.x,a.y,a.w,a.h); c.textBaseline="alphabetic"; }
  fmtTick(v){ const a=Math.abs(v); if(a>=1000)return(v/1000).toFixed(1)+"k"; if(a<1&&a>0)return v.toFixed(2); return String(Math.round(v*100)/100); }
  line(pts,color,dash,lw){ if(!this.ctx||!pts.length)return; const c=this.ctx; c.strokeStyle=color;c.lineWidth=lw||1.6;
    c.setLineDash(dash||[]); c.beginPath(); pts.forEach((p,i)=>{ const x=this.px(p[0]),y=this.py(p[1]); i?c.lineTo(x,y):c.moveTo(x,y); });
    c.stroke(); c.setLineDash([]); }
  scatter(pts,color,rad){ if(!this.ctx)return; const c=this.ctx; c.fillStyle=color;
    for(const p of pts){ c.beginPath();c.arc(this.px(p[0]),this.py(p[1]),rad||2.4,0,TAU);c.fill(); } }
  legend(items){ if(!this.ctx)return; const c=this.ctx,a=this.plotArea(); let y=a.y+4;
    c.font="10px Segoe UI"; c.textBaseline="middle";
    for(const it of items){ const tw=c.measureText(it.label).width; const x=a.x+a.w-tw-18;
      c.fillStyle=it.color; c.fillRect(x,y-3,10,6); c.fillStyle="#3a424d"; c.fillText(it.label,x+14,y); y+=14; }
    c.textBaseline="alphabetic"; }
  note(txt){ if(!this.ctx)return; const c=this.ctx,a=this.plotArea(); c.fillStyle="#9aa1ab";c.font="11px Segoe UI";
    c.fillText(txt,a.x+a.w/2-c.measureText(txt).width/2,a.y+a.h/2); }
  hist(vals,color,xl){ this.clear("Latency histogram",xl||"latency (ms)","count");
    if(!vals.length){this.note("no data yet");return;}
    const mx=Math.max(...vals), nb=24, bins=new Array(nb).fill(0);
    for(const v of vals)bins[Math.min(nb-1,Math.floor(v/mx*nb))]++;
    this.setScale(0,mx,0,Math.max(...bins)*1.1); const a=this.plotArea(), bw=a.w/nb;
    const c=this.ctx; c.fillStyle=color;
    bins.forEach((b,i)=>{ const x=this.px(i/nb*mx), h=a.y+a.h-this.py(b); c.fillRect(x+1,this.py(b),bw-2,h); }); }
  cdf(series){ this.clear("Latency CDF","latency (ms)","P(≤x)");
    let any=false; for(const s of series)if(s.vals.length)any=true;
    if(!any){this.note("no data yet");return;}
    let mx=1; for(const s of series)if(s.vals.length)mx=Math.max(mx,...s.vals);
    this.setScale(0,mx,0,1);
    for(const s of series){ if(!s.vals.length)continue; const sorted=[...s.vals].sort((a,b)=>a-b);
      const pts=sorted.map((v,i)=>[v,(i+1)/sorted.length]); this.line(pts,s.color,null,1.6); }
    this.legend(series.filter(s=>s.vals.length).map(s=>({label:s.label,color:s.color}))); }
  box(groups){ this.clear("Latency by mode","","latency (ms)");
    const gs=groups.filter(g=>g.vals.length); if(!gs.length){this.note("run a sweep or let modes accumulate");return;}
    let mx=1; for(const g of gs)mx=Math.max(mx,...g.vals);
    this.setScale(0,gs.length,0,mx*1.1); const a=this.plotArea(), bw=a.w/gs.length, c=this.ctx;
    gs.forEach((g,i)=>{ const q=quartiles(g.vals), cx=a.x+bw*(i+0.5);
      c.strokeStyle=g.color;c.fillStyle=g.color+"33";c.lineWidth=1.4;
      const yq1=this.py(q.q1),yq3=this.py(q.q3),ymed=this.py(q.med),ymin=this.py(q.min),ymax=this.py(q.max);
      c.beginPath();c.moveTo(cx,ymin);c.lineTo(cx,ymax);c.stroke();
      c.fillRect(cx-bw*0.28,yq3,bw*0.56,yq1-yq3); c.strokeRect(cx-bw*0.28,yq3,bw*0.56,yq1-yq3);
      c.beginPath();c.moveTo(cx-bw*0.28,ymed);c.lineTo(cx+bw*0.28,ymed);c.stroke();
      c.fillStyle="#3a424d";c.font="10px Segoe UI";c.fillText(g.label,cx-c.measureText(g.label).width/2,a.y+a.h+22); }); }
  bars(groups,title,yl){ this.clear(title,"",yl);
    if(!groups.length){this.note("no data");return;}
    let mx=1; for(const g of groups)mx=Math.max(mx,g.value);
    this.setScale(0,groups.length,0,mx*1.15); const a=this.plotArea(), bw=a.w/groups.length, c=this.ctx;
    groups.forEach((g,i)=>{ const cx=a.x+bw*(i+0.5), y=this.py(g.value);
      c.fillStyle=g.color||"#0b5cad"; c.fillRect(cx-bw*0.3,y,bw*0.6,a.y+a.h-y);
      c.fillStyle="#3a424d";c.font="10px Segoe UI";c.fillText(g.label,cx-c.measureText(g.label).width/2,a.y+a.h+14);
      c.fillStyle="#1d2733";c.font="600 10px Consolas"; const vt=Number.isFinite(g.value)?(g.value>=100?g.value.toFixed(0):g.value.toFixed(2)):"-";
      c.fillText(vt,cx-c.measureText(vt).width/2,y-4); }); }
  toDataURL(){ return this.cv?this.cv.toDataURL("image/png"):null; }
